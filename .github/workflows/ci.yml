# T83: перевірки на кожен PR і push у main (без секретів і без SSH-деплою).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-and-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, pdo, pdo_mysql, xml, ctype, json, bcmath, curl
          coverage: none

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: PHPUnit
        run: composer test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Vite build
        run: npm run build

      - name: Node unit tests
        run: |
          npm run test:msg-parse
          npm run test:country-filter
