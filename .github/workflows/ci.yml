# T83: перевірки на кожен PR і push у main; опційний SSH-деплой на push у main, якщо задані vars/secrets.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-and-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose validate
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker/compose.yaml config

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, pdo, pdo_mysql, xml, ctype, json, bcmath, curl
          coverage: none

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      # Vite manifest потрібен для Feature-тестів, що рендерять spa.blade (@vite).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Vite build
        run: npm run build

      - name: PHPUnit
        run: composer test

      - name: Node unit tests
        run: |
          npm run test:msg-parse
          npm run test:country-filter

  # Опційно: налаштуйте в GitHub → Settings → Secrets and variables → Actions:
  #   Variables: DEPLOY_HOST, DEPLOY_USER, DEPLOY_REPO_DIR (напр. /var/www/redpanda)
  #   Secrets: DEPLOY_SSH_KEY (приватний ключ deploy-користувача)
  # На сервері має бути розкоментований реальний deploy (див. docker/deploy.example.sh).
  deploy:
    needs: backend-and-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_HOST != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO="${{ vars.DEPLOY_REPO_DIR }}"
            test -n "$REPO"
            cd "$REPO"
            ./docker/deploy.sh
