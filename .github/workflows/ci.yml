# T83: на кожен PR і push у main — тести; деплой лише після зеленого test job, лише push у main (vars/secrets).
# Гейт: job deploy має needs: test — поки PHPUnit / Node-тести не пройшли, SSH-деплой не стартує.
# Compose: `docker compose -f docker/compose.yaml config` (без production.env — лише валідація маніфесту).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Compose, PHP, Vite, PHPUnit)
    concurrency:
      group: ci-test-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose validate
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker/compose.yaml config

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, pdo, pdo_mysql, xml, ctype, json, bcmath, curl
          coverage: none

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      # Vite manifest потрібен для Feature-тестів, що рендерять spa.blade (@vite).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Vite build
        run: npm run build

      - name: PHPUnit
        run: composer test

      - name: Node unit tests
        run: |
          npm run test:msg-parse
          npm run test:country-filter

  # Деплой: push у main після успішного test. У jobs.<id>.if недоступний контекст secrets (див. GitHub «Contexts reference»).
  # Увімкнення: Variables — DEPLOY_HOST (непорожній) АБО DEPLOY_ENABLED=true (якщо host/user/repo лише в Secrets).
  # Secrets: DEPLOY_SSH_KEY; опційно Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_REPO_DIR — підставляються в кроках через ${{ secrets.* }}.
  # Окрема concurrency: не скасовувати напівзавершений SSH-деплой при новому push; нові деплої чекають у черзі (cancel-in-progress: false).
  deploy:
    name: Deploy to production (SSH)
    needs: test
    concurrency:
      group: deploy-production-redpanda-main
      cancel-in-progress: false
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO="${{ vars.DEPLOY_REPO_DIR || secrets.DEPLOY_REPO_DIR }}"
            test -n "$REPO"
            cd "$REPO"
            ./docker/deploy.sh
