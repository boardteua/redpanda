# T83: на кожен PR і push у main — тести; деплой лише після зеленого test job, лише push у main (vars/secrets).
# Гейт: job deploy має needs: test — поки PHPUnit / Node-тести не пройшли, SSH-деплой не стартує.
# Compose: `docker compose -f docker/compose.yaml config` (без production.env — лише валідація маніфесту).
# T107: job dependency-audit — composer audit + npm audit (інформативно); завжди exit 0, не блокує merge/деплой; політика — без fail-hard за low (див. крок summary).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Compose, PHP, Vite, PHPUnit)
    concurrency:
      group: ci-test-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose validate
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker/compose.yaml config

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, pdo, pdo_mysql, xml, ctype, json, bcmath, curl
          coverage: none

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      # Vite manifest потрібен для Feature-тестів, що рендерять spa.blade (@vite).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Vite build
        run: npm run build

      - name: PHPUnit
        run: composer test

      - name: Node unit tests
        run: |
          npm run test:msg-parse
          npm run test:country-filter

  # T107: паралельно з test; deploy лишається needs: test — аудит не гейтить реліз.
  dependency-audit:
    name: Dependency audit (informative, T107)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP (composer)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer

      - name: Setup Node (npm)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: composer audit + npm audit (non-blocking)
        shell: bash
        env:
          AUDIT_OUT: ${{ github.workspace }}/.audit-out
        run: |
          set +e
          mkdir -p "$AUDIT_OUT"
          composer audit --format=json > "$AUDIT_OUT/composer-audit.json" 2>&1
          echo -n $? > "$AUDIT_OUT/composer-exit.code"
          # package-lock-only: без npm ci, той самий lock, що в репо
          npm audit --package-lock-only --json > "$AUDIT_OUT/npm-audit.json" 2>&1
          echo -n $? > "$AUDIT_OUT/npm-exit.code"
          set -e
          {
            echo "### Dependency audit (T107)"
            echo "Інформативний крок: **не блокує** merge і деплой. Політика репо: **без fail-hard** за низьку серйозність; повний вивід — артефакт **dependency-audits**."
            echo ""
            C_EXIT=$(cat "$AUDIT_OUT/composer-exit.code")
            N_EXIT=$(cat "$AUDIT_OUT/npm-exit.code")
            echo "| Команда | Exit code |"
            echo "|---------|-----------|"
            echo "| composer audit | $C_EXIT |"
            echo "| npm audit | $N_EXIT |"
            echo ""
            if jq -e . "$AUDIT_OUT/composer-audit.json" >/dev/null 2>&1; then
              CAB=$(jq '.advisories | length' "$AUDIT_OUT/composer-audit.json")
              ABN=$(jq '.abandoned | length' "$AUDIT_OUT/composer-audit.json")
              echo "- **Composer:** advisories=$CAB, abandoned=$ABN"
            else
              echo "- **Composer:** вивід не JSON (мережа/Packagist або помилка CLI) — див. \`composer-audit.json\` у артефакті."
            fi
            if jq -e .metadata "$AUDIT_OUT/npm-audit.json" >/dev/null 2>&1; then
              jq -r '"- **npm:** total=" + (.metadata.vulnerabilities.total|tostring) + " (critical=" + (.metadata.vulnerabilities.critical|tostring) + ", high=" + (.metadata.vulnerabilities.high|tostring) + ", moderate=" + (.metadata.vulnerabilities.moderate|tostring) + ", low=" + (.metadata.vulnerabilities.low|tostring) + ")"' "$AUDIT_OUT/npm-audit.json" || echo "- **npm:** див. \`npm-audit.json\` у артефакті."
            else
              echo "- **npm:** не вдалося прочитати metadata — див. \`npm-audit.json\` у артефакті."
            fi
          } >> "$GITHUB_STEP_SUMMARY" || true
          exit 0

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audits
          path: ${{ github.workspace }}/.audit-out/

  # Деплой: push у main після успішного test. У jobs.<id>.if недоступний контекст secrets (див. GitHub «Contexts reference»).
  # Увімкнення: Variables — DEPLOY_HOST (непорожній) АБО DEPLOY_ENABLED=true (якщо host/user/repo лише в Secrets).
  # Secrets: DEPLOY_SSH_KEY; опційно Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_REPO_DIR — підставляються в кроках через ${{ secrets.* }}.
  # Окрема concurrency: не скасовувати напівзавершений SSH-деплой при новому push; нові деплої чекають у черзі (cancel-in-progress: false).
  deploy:
    name: Deploy to production (SSH)
    needs: test
    concurrency:
      group: deploy-production-redpanda-main
      cancel-in-progress: false
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO="${{ vars.DEPLOY_REPO_DIR || secrets.DEPLOY_REPO_DIR }}"
            test -n "$REPO"
            cd "$REPO"
            ./docker/deploy.sh
