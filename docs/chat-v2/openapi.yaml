          nullable: true
          description: Опційно; «липкий» стан зазвичай зберігається в localStorage на клієнті

    ChatMessageListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        meta:
          type: object
          required: [next_cursor, last_read_post_id, slug_redirect, canonical_slug, canonical_room_id]
          properties:
            next_cursor:
              type: integer
              nullable: true
            last_read_post_id:
              type: integer
              nullable: true
              description: Останній прочитаний post_id (T47); null якщо стану ще немає
            first_unread_post_id:
              type: integer
              nullable: true
              description: Лише коли `since_read=true` у запиті; перший непрочитаний у межах сторінки
            slug_redirect:
              type: boolean
              description: T153 — true, якщо path був історичним slug
            canonical_slug:
              type: string
              description: T153 — поточний slug кімнати для URL
            canonical_room_id:
              type: integer
              description: T153 — `rooms.room_id` для кімнати відповіді

    PostRoomReadRequest:
      type: object
      required: [last_read_post_id]
      properties:
        last_read_post_id:
          type: integer
          minimum: 1

    RoomReadResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [room_id, last_read_post_id]
          properties:
            room_id:
              type: integer
            last_read_post_id:
              type: integer

    RoomPresenceStatusesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties:
            type: string
            enum: [online, away, inactive]
          description: Ключі — рядкові user id

    PostRoomPresenceStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [online, away, inactive]

    RoomPresenceStatusPostResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [room_id, user_id, status]
          properties:
            room_id:
              type: integer
            user_id:
              type: integer
            status:
              type: string
              enum: [online, away, inactive]

    RoomPeerHintEntry:
      type: object
      required: [sex]
      properties:
        sex:
          type: string
          enum: [male, female, other]

    RoomPeerHintsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RoomPeerHintEntry"

    ArchiveMessagesPaginatedResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        links:
          type: object
          description: Посилання пагінації Laravel (`first`, `last`, `prev`, `next`; можуть бути `null`)
        meta:
          type: object
          description: Метадані LengthAwarePaginator (мінімум current_page, last_page, per_page, total)
          properties:
            current_page:
              type: integer
            last_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            from:
              type: integer
              nullable: true
            to:
              type: integer
              nullable: true

    ChatMessagePostResponseCreated:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ChatMessage"
        meta:
          type: object
          required: [duplicate, slash]
          properties:
            duplicate:
              type: boolean
              enum: [false]
            slash:
              $ref: "#/components/schemas/SlashMeta"

    ChatMessagePostResponseDuplicate:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ChatMessage"
        meta:
          type: object
          required: [duplicate, slash]
          properties:
            duplicate:
              type: boolean
              enum: [true]
            slash:
              $ref: "#/components/schemas/SlashMeta"

    ValidationErrorBody:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    ClientIdRoomConflict:
      type: object
      properties:
        message:
          type: string
          example: client_message_id already used for another room.

    OEmbedProxyResponse:
      type: object
      description: >
        Піднабір полів oEmbed. `html` присутній лише якщо залишилися дозволені `iframe`;
        інша розмітка від провайдера відкидається.
      properties:
        type:
          type: string
          example: video
        version:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        author_name:
          type: string
          nullable: true
        author_url:
          type: string
          nullable: true
        provider_name:
          type: string
          nullable: true
        provider_url:
          type: string
          nullable: true
        cache_age:
          type: integer
          nullable: true
        thumbnail_url:
          type: string
          nullable: true
        thumbnail_width:
          type: integer
          nullable: true
        thumbnail_height:
          type: integer
          nullable: true
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        html:
          type: string
          nullable: true
          description: Лише санітизовані `iframe` (https, білий список хостів)

    ErrorMessage:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
          description: |
            Опційний машиночитаний код помилки (наприклад **`message_flood_limit`** для **T125** при `429` на `POST …/messages`).

  responses:
    Unauthorized:
      description: Неавторизовано
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
    Forbidden:
      description: Немає доступу до кімнати
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
    NotFound:
      description: Кімната не знайдена
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
    ValidationError:
      description: Помилка валідації
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorBody"
    TooManyRequests:
      description: Перевищено ліміт запитів
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
