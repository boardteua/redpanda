openapi: 3.0.3
info:
  title: redpanda Chat v2 API
  description: |
    HTTP API для чату v2 (Laravel backend у каталозі `backend/`).

    **Sanctum SPA (cookie):** для браузерного клієнта з того ж сайту спочатку викликайте `GET /sanctum/csrf-cookie` з `credentials: include`,
    потім передавайте заголовок `X-XSRF-TOKEN` (значення з cookie `XSRF-TOKEN`, URL-decoded) на всі **змінюючі** запити (`POST` тощо) разом з cookie сесії.
    Див. також [T03-QA.md](T03-QA.md).

    **Вміст повідомлень:** поля `post_message`, `post_user`, `topic` повертаються як сирі рядки; клієнт має рендерити їх як **текст**, а не HTML,
    доки окремо не впроваджено санітизацію (див. [T04-QA.md](T04-QA.md)).

    **Обмеження частоти:** див. опис відповідей `429` і реалізацію у `AppServiceProvider` (`auth-*`, `chat-read`, `chat-post`, `archive-read`, `image-upload`, `image-read`, `private-*`, `mod-actions`).

    **WebSocket (Laravel Reverb, протокол як у Pusher):** приватні канали `private-room.{roomId}` та `private-user.{userId}` авторизуються через `POST /broadcasting/auth` (сесія + для змінюючих запитів CSRF).
    Після успішного `POST /api/v1/rooms/{roomId}/messages` транслюється подія **`.MessagePosted`** на `private-room.{roomId}` (деталі payload — [T05-QA.md](T05-QA.md)).

    **SPA:** маршрут **`/chat`** (Vue) — стрічка кімнати з Echo + poll fallback; **`/archive`** — архів (таблиця, пагінація, пошук, T09). З головної з `?history=1` після входу — перехід на архів.

    **Архів (T09):** `GET /api/v1/archive/messages` — offset-пагінація (`page`, `per_page` ∈ {10,25,50,100}), пошук `q` (≤200 символів); деталі — [T09-QA.md](T09-QA.md).

    **Медіа (T10):** `POST /api/v1/images` (multipart, поле `image`), `GET /api/v1/images/{id}/file` — файли на диску `storage/app/chat-images` (не в `public/`); доступ до файлу за політикою (власник або повідомлення в доступній кімнаті). Повідомлення: опційний `image_id` у `POST .../messages` — [T10-QA.md](T10-QA.md).

    **Спостережуваність (T11):** `GET /up` (liveness), `GET /health/ready` (readiness, JSON); структуровані логи — [T11-QA.md](T11-QA.md), runbook — [T11-RUNBOOK.md](T11-RUNBOOK.md).

    **Модерація MVP (T12):** таблиці `banned_ips`, `filter_words`; на `users` — `user_rank`, `mute_until`, `kick_until`; API `/api/v1/mod/*` для `user_rank ≥ 1` — [T12-QA.md](T12-QA.md).

    **Приват і соціальне (T08):** `GET /api/v1/private/conversations`, `GET|POST /api/v1/private/peers/{userId}/messages`,
    `GET /api/v1/users/lookup`, ендпоінти `friends*` та `ignores*` (деталі та сценарії — [T08-QA.md](T08-QA.md)).
    Подія **`.PrivateMessagePosted`** на каналі **`private-user.{recipientId}`** (авторизація як для `user.{id}` у `routes/channels.php`).
  version: "0.11.1"
  license:
    name: Proprietary
    url: https://example.com/

servers:
  - url: /
    description: Відносно origin додатку (наприклад http://127.0.0.1:8000)

tags:
  - name: Auth
    description: Реєстрація, сесія, профіль
  - name: Chat
    description: Кімнати та публічні повідомлення (T04)
  - name: Health
    description: Liveness / readiness (T11)
  - name: Moderation
    description: Бан IP, фільтр слів, mute/kick (T12, потрібен user_rank ≥ 1)

paths:
  /up:
    get:
      tags: [Health]
      summary: Liveness (процес відповідає)
      description: Вбудований маршрут Laravel; HTML-відповідь. Не перевіряє БД.
      operationId: healthUp
      security: []
      responses:
        "200":
          description: OK
        "500":
          description: Помилка під час діагностики (див. подію DiagnosingHealth)

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness (БД та за потреби Redis)
      description: |
        `checks.database` завжди; `checks.redis` — якщо `HEALTH_CHECK_REDIS=true` або cache/queue на redis.
        **503** якщо `status` = `degraded`.
      operationId: healthReady
      security: []
      responses:
        "200":
          description: Усі перевірки ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"
        "503":
          description: Одна або кілька перевірок fail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"

  /api/v1/mod/banned-ips:
    get:
      tags: [Moderation]
      summary: Список заблокованих IP
      operationId: modListBannedIps
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Масив у `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModBannedIpListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Moderation]
      summary: Додати IP у бан
      operationId: modStoreBannedIp
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModBanIpRequest"
      responses:
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModBannedIpCreatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/banned-ips/{bannedIpId}:
    delete:
      tags: [Moderation]
      summary: Прибрати IP з бану
      operationId: modDestroyBannedIp
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/BannedIpId"
      responses:
        "204":
          description: Видалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/filter-words:
    get:
      tags: [Moderation]
      summary: Список слів фільтра
      operationId: modListFilterWords
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Масив у `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModFilterWordListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Moderation]
      summary: Додати слово у фільтр
      operationId: modStoreFilterWord
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModFilterWordRequest"
      responses:
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModFilterWordCreatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/filter-words/{filterWordId}:
    delete:
      tags: [Moderation]
      summary: Прибрати слово з фільтра
      operationId: modDestroyFilterWord
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/FilterWordId"
      responses:
        "204":
          description: Видалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users/{userId}/mute:
    post:
      tags: [Moderation]
      summary: Мут користувача (хвилини; 0 або відсутнє — зняти)
      operationId: modMuteUser
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModMinutesRequest"
      responses:
        "200":
          description: Оновлені обмеження
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModUserRestrictionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users/{userId}/kick:
    post:
      tags: [Moderation]
      summary: Kick користувача (хвилини; 0 або відсутнє — зняти)
      operationId: modKickUser
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModMinutesRequest"
      responses:
        "200":
          description: Оновлені обмеження
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModUserRestrictionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /sanctum/csrf-cookie:
    get:
      tags: [Auth]
      summary: Отримати CSRF cookie (перед POST з браузера)
      operationId: sanctumCsrfCookie
      security: []
      responses:
        "204":
          description: Cookie `XSRF-TOKEN` виставлено; використайте його для заголовка `X-XSRF-TOKEN`.
        "403":
          description: Доступ заборонено (наприклад, некоректний origin для stateful Sanctum).

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Реєстрація
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Створено; сесія відкрита
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Вхід за паролем
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK; сесія відкрита
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/guest:
    post:
      tags: [Auth]
      summary: Вхід як гість
      operationId: authGuest
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestRequest"
      responses:
        "201":
          description: Створено гостьового користувача; сесія відкрита
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/user:
    get:
      tags: [Auth]
      summary: Поточний користувач
      operationId: authUser
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Поточний користувач (обгортка `data`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Вихід (інвалідація сесії)
      operationId: authLogout
      security:
        - sanctumSession: []
          csrfHeader: []
      responses:
        "204":
          description: Немає тіла
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/rooms:
    get:
      tags: [Chat]
      summary: Список кімнат, доступних користувачу
      description: Гості отримують лише кімнати з `access === 0`.
      operationId: listRooms
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Список кімнат у полі `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/archive/messages:
    get:
      tags: [Chat]
      summary: Архів публічних повідомлень (offset-пагінація)
      description: |
        Вибірка з усіх кімнат, доступних користувачу за правилом `interact` (аналогічно до `GET /api/v1/rooms`).
        Параметр `room` обмежує однією кімнатою; **403**, якщо кімната недоступна, **404**, якщо `room_id` не існує.
        Пошук `q` — підрядок у `post_message` або `post_user` (символи `%` та `_` у вводі екрануються для SQL LIKE).
      operationId: listArchiveMessages
      security:
        - sanctumSession: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 25
        - name: q
          in: query
          description: Пошук за текстом повідомлення або ніком автора
          schema:
            type: string
            maxLength: 200
        - name: room
          in: query
          description: Фільтр за `room_id`
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Сторінка повідомлень у форматі пагінації Laravel (`data`, `links`, `meta`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveMessagesPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/images:
    post:
      tags: [Chat]
      summary: Завантажити зображення (чернетка перед повідомленням)
      description: |
        `multipart/form-data`, поле **`image`**. Дозволені MIME: `image/jpeg`, `image/png`, `image/gif`, `image/webp`; максимум **4096 КБ**.
        У відповіді — `data.id` для передачі в `POST /api/v1/rooms/{roomId}/messages` як `image_id`.
      operationId: uploadChatImage
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "201":
          description: Збережено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatImageUploadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/images/{imageId}/file:
    get:
      tags: [Chat]
      summary: Отримати файл зображення
      description: |
        Потік байтів з коректним `Content-Type`. Доступ: власник зображення або користувач з доступом до кімнати, де є повідомлення з цим `image_id` у полі `file`.
      operationId: downloadChatImageFile
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/ImageId"
      responses:
        "200":
          description: Тіло зображення
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/messages:
    get:
      tags: [Chat]
      summary: Історія повідомлень (сторінка)
      description: |
        Повертає до `limit` повідомлень старіших за `before` (якщо задано), у полі `data` — у **хронологічному** порядку (старі → новіші у межах сторінки).
        `meta.next_cursor` — мінімальний `post_id` у сторінці для наступного запиту «старіше».
      operationId: listRoomMessages
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - name: before
          in: query
          description: Повернути лише повідомлення з `post_id` < `before`
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Сторінка повідомлень і `meta.next_cursor`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Chat]
      summary: Надіслати повідомлення
      description: |
        Ідемпотентність: повтор з тим самим `client_message_id` у **тій самій** кімнаті повертає **200** і той самий ресурс з `meta.duplicate: true`.
        Той самий ключ у **іншій** кімнаті — **422**.
        `meta.slash` завжди присутній; для відповіді-дубля — `recognized: false` (тіло повторного запиту не застосовується).
        Потрібен **непорожній** `message` (після trim) або **`image_id`** власного завантаження (`POST /api/v1/images`).
      operationId: postRoomMessage
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostChatMessageRequest"
      responses:
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessagePostResponseCreated"
        "200":
          description: Ідемпотентний повтор (дубль)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessagePostResponseDuplicate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Валідація або конфлікт `client_message_id` з іншою кімнатою
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorBody"
                  - $ref: "#/components/schemas/ClientIdRoomConflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

components:
  securitySchemes:
    sanctumSession:
      type: apiKey
      in: cookie
      name: laravel_session
      description: Ім’я cookie зазвичай з `SESSION_COOKIE` у `.env` (типово `laravel_session`).
    csrfHeader:
      type: apiKey
      in: header
      name: X-XSRF-TOKEN
      description: Після `GET /sanctum/csrf-cookie` — значення з cookie `XSRF-TOKEN` (URL decode).

  parameters:
    ImageId:
      name: imageId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    BannedIpId:
      name: bannedIpId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    FilterWordId:
      name: filterWordId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    ModUserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: `users.id` цілі

    RoomId:
      name: roomId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Первинний ключ `rooms.room_id`

  schemas:
    RegisterRequest:
      type: object
      required: [user_name, email, password, password_confirmation]
      properties:
        user_name:
          type: string
          minLength: 2
          maxLength: 191
        email:
          type: string
          format: email
        password:
          type: string
        password_confirmation:
          type: string

    LoginRequest:
      type: object
      required: [user_name, password]
      properties:
        user_name:
          type: string
        password:
          type: string
        remember:
          type: boolean

    GuestRequest:
      type: object
      properties:
        user_name:
          type: string
          nullable: true
          description: Якщо null/відсутнє — сервер генерує нік.

    User:
      type: object
      properties:
        id:
          type: integer
        user_name:
          type: string
        guest:
          type: boolean
        email:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
          description: URL аватарки профілю; поки може бути null (T18)

    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/User"

    Room:
      type: object
      properties:
        room_id:
          type: integer
        room_name:
          type: string
        topic:
          type: string
          nullable: true
        access:
          type: integer
          description: "0 — усі авторизовані (гості дозволені); > 0 — лише зареєстровані"

    HealthReadyResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, fail]
          description: Мінімум `database`; опційно `redis`

    ModBanIpRequest:
      type: object
      required: [ip]
      properties:
        ip:
          type: string
          description: IPv4 або IPv6

    ModBannedIpRow:
      type: object
      properties:
        id:
          type: integer
        ip:
          type: string
        created_at:
          type: string
          format: date-time

    ModBannedIpListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModBannedIpRow"

    ModBannedIpCreatedResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ModBannedIpRow"

    ModFilterWordRequest:
      type: object
      required: [word]
      properties:
        word:
          type: string
          minLength: 2
          maxLength: 191

    ModFilterWordRow:
      type: object
      properties:
        id:
          type: integer
        word:
          type: string
        created_at:
          type: string
          format: date-time

    ModFilterWordListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModFilterWordRow"

    ModFilterWordCreatedResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ModFilterWordRow"

    ModMinutesRequest:
      type: object
      properties:
        minutes:
          type: integer
          minimum: 0
          maximum: 525600
          nullable: true
          description: Тривалість; 0 або пропуск — зняти обмеження

    ModUserRestrictionData:
      type: object
      properties:
        id:
          type: integer
        user_name:
          type: string
        mute_until:
          type: integer
          nullable: true
        kick_until:
          type: integer
          nullable: true

    ModUserRestrictionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ModUserRestrictionData"

    RoomListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Room"

    ChatMessage:
      type: object
      properties:
        post_id:
          type: integer
        user_id:
          type: integer
        post_date:
          type: integer
          description: Unix timestamp
        post_time:
          type: string
          nullable: true
        post_user:
          type: string
        avatar:
          type: string
          nullable: true
          description: URL аватарки автора на момент допису; null — показувати ініціали (див. T17/T18)
        post_message:
          type: string
        post_color:
          type: string
          nullable: true
        post_roomid:
          type: integer
        type:
          type: string
        client_message_id:
          type: string
          nullable: true
        file:
          type: integer
          description: 0 — без вкладення; інакше `images.id`
        image:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            url:
              type: string
              format: uri

    ChatImageUploadResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, url, mime, size_bytes]
          properties:
            id:
              type: integer
            url:
              type: string
              format: uri
            mime:
              type: string
            size_bytes:
              type: integer

    SlashMeta:
      type: object
      required: [name, recognized]
      properties:
        name:
          type: string
          nullable: true
        recognized:
          type: boolean

    PostChatMessageRequest:
      type: object
      required: [client_message_id]
      properties:
        message:
          type: string
          maxLength: 4000
          nullable: true
        image_id:
          type: integer
          minimum: 1
          nullable: true
          description: Ідентифікатор з `POST /api/v1/images`; має належати поточному користувачу
        client_message_id:
          type: string
          format: uuid

    ChatMessageListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        meta:
          type: object
          required: [next_cursor]
          properties:
            next_cursor:
              type: integer
              nullable: true

    ArchiveMessagesPaginatedResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        links:
          type: object
          description: Посилання пагінації Laravel (`first`, `last`, `prev`, `next`; можуть бути `null`)
        meta:
          type: object
          description: Метадані LengthAwarePaginator (мінімум current_page, last_page, per_page, total)
          properties:
            current_page:
              type: integer
            last_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            from:
              type: integer
              nullable: true
            to:
              type: integer
              nullable: true

    ChatMessagePostResponseCreated:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ChatMessage"
        meta:
          type: object
          required: [duplicate, slash]
          properties:
            duplicate:
              type: boolean
              enum: [false]
            slash:
              $ref: "#/components/schemas/SlashMeta"

    ChatMessagePostResponseDuplicate:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ChatMessage"
        meta:
          type: object
          required: [duplicate, slash]
          properties:
            duplicate:
              type: boolean
              enum: [true]
            slash:
              $ref: "#/components/schemas/SlashMeta"

    ValidationErrorBody:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    ClientIdRoomConflict:
      type: object
      properties:
        message:
          type: string
          example: client_message_id already used for another room.

    ErrorMessage:
      type: object
      properties:
        message:
          type: string

  responses:
    Unauthorized:
      description: Неавторизовано
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
    Forbidden:
      description: Немає доступу до кімнати
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
    NotFound:
      description: Кімната не знайдена
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
    ValidationError:
      description: Помилка валідації
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorBody"
    TooManyRequests:
      description: Перевищено ліміт запитів
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
