    ChatMessage:
      type: object
      properties:
        post_id:
          type: integer
        user_id:
          type: integer
        post_date:
          type: integer
          description: >
            Unix time у секундах (UTC instant). Джерело правди для моменту допису; клієнт показує час у локальній TZ/локалі (T121).
            Поле `post_time` — легасі-рядок з серверної TZ, не використовувати як єдине джерело для відображення.
        post_edited_at:
          type: integer
          nullable: true
          description: Unix час останнього редагування; null — не редагувалось
        can_edit:
          type: boolean
          description: Чи дозволено поточному користувачу `PATCH` це повідомлення (T36)
        post_deleted_at:
          type: integer
          nullable: true
          description: Unix час soft-delete; null — повідомлення активне (T37)
        can_delete:
          type: boolean
          description: Чи дозволено поточному користувачу `DELETE` це повідомлення; false після видалення (T37)
        post_time:
          type: string
          nullable: true
          description: Легасі H:i з сервера; для UI віддавати перевагу `post_date` (T121).
        post_user:
          type: string
        avatar:
          type: string
          nullable: true
          description: URL аватарки автора на момент допису; null — показувати ініціали (див. T17/T18)
        post_message:
          description: Plain text тіла повідомлення (не HTML); клієнт не повинен інтерпретувати як розмітку.
          type: string
        post_style:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ChatMessageBodyStyle"
        post_color:
          type: string
          nullable: true
        post_roomid:
          type: integer
        type:
          type: string
          description: >
            `public` — загальне повідомлення кімнати; `inline_private` — інлайн-приват у стрічці (T25),
            видимий лише відправнику та адресату в `GET .../rooms/{id}/messages`; не потрапляє в архів.
            Для `inline_private` сервер також створює рядок у `private_messages` (той самий `client_message_id`), щоб узгодити з приватним API.
            `client_only` (T66) — відповідь slash-команди лише для автора; інші учасники кімнати не бачать рядок у стрічці; без broadcast у `room.*`.
            `system` (**T149**) — службове повідомлення від системного бота; `post_color` зазвичай `system`; згадки «нік >» не застосовуються (`mentioned_user_ids` порожній).
        system_kind:
          type: string
          nullable: true
          description: >
            Для `type === system`: `room_join` | `room_welcome` | `new_public_room`; інакше `null`.
        target_room_id:
          type: integer
          nullable: true
          description: >
            Для `type === system` (напр. оголошення про нову кімнату) — `room_id` для кнопки переходу у **T150**; інакше `null`.
        action_label:
          type: string
          nullable: true
          description: Підпис для CTA (напр. «Перейти в кімнату») для **T150**; інакше `null`.
        recipient_user_id:
          type: integer
          nullable: true
          description: Для `inline_private` — id адресата; інакше відсутнє.
        mentioned_user_ids:
          type: array
          description: >
            Id користувачів, згаданих префіксом «нік > …» у `public` повідомленні (T25/T123);
            порожній масив, якщо префікса немає або нік не знайдено. Для Echo `MessagePosted` збігається з REST.
          items:
            type: integer
        client_message_id:
          type: string
          nullable: true
        file:
          type: integer
          description: 0 — без вкладення; інакше `images.id`
        image:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            url:
              type: string
              format: uri

