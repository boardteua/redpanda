openapi: 3.0.3
info:
  title: Тернопільський Анонімний Чат API
  description: |
    HTTP API для продукту «Тернопільський Анонімний Чат» (внутрішній код репозиторію redpanda; Laravel backend у каталозі `backend/`).

    **Sanctum SPA (cookie):** для браузерного клієнта з того ж сайту спочатку викликайте `GET /sanctum/csrf-cookie` з `credentials: include`,
    потім передавайте заголовок `X-XSRF-TOKEN` (значення з cookie `XSRF-TOKEN`, URL-decoded) на всі **змінюючі** запити (`POST` тощо) разом з cookie сесії.
    Див. також [T03-QA.md](T03-QA.md).

    **Вміст повідомлень:** поля `post_message`, `post_user`, `topic` повертаються як сирі рядки **plain text** (не HTML); клієнт має рендерити їх як **текст** (наприклад інтерполяція в шаблоні), а не як розмітку,
    доки окремо не впроваджено санітизацію (див. [T04-QA.md](T04-QA.md)). Тіло запиту `message` у `POST`/`PATCH` кімнатних повідомлень — також **plain text**; максимальна довжина залежить від ролі: **гість 2000**, **звичайний користувач 4000**, **VIP / модератор / адмін 8000** символів (див. валідацію Laravel).

    **Обмеження частоти:** див. опис відповідей `429` і реалізацію у `AppServiceProvider` (`auth-*` — для `auth-login` два ключі: IP і нормалізований `user_name`; `auth-guest` 12/хв на IP; інші — `landing-read`, `chat-read`, `chat-mark-read`, `chat-post`, `archive-read`, `image-upload`, `image-read`, `private-*`, `mod-actions`, `mod-user-read`, `mod-flagged-read`, `presence-status`, `room-create`, `room-manage`, `oembed-read`, `emoticon-read`).

    **Смайли / emoticon (T63):** `GET /api/v1/chat/emoticons` — активні записи каталогу (throttle `emoticon-read`); файли за URL `/emoticon/{file}`. Адмін: `GET|POST|PATCH|DELETE /api/v1/mod/emoticons` (multipart на `POST` / опційно `PATCH`), `can:chat-admin`, throttle `mod-actions`. Деталі — [T63-QA.md](T63-QA.md).

    **oEmbed-проксі (T55):** `GET /api/v1/oembed` — лише автентифікований користувач (Sanctum SPA); безпечний проксі до провайдерів з реєстру oEmbed, кеш, SSRF-захист, санітизація `html` (лише `iframe` з дозволених хостів). Деталі — [T55-oembed.md](T55-oembed.md).

    **Кімнати CRUD (T54):** `PATCH /api/v1/rooms/{roomId}` — назва/опис для творця або staff; поле `access` — лише модератор/адмін. `DELETE` — творець або staff, **422** (`room_has_messages`), якщо в кімнаті є повідомлення (захист історії). Деталі — [T54-QA.md](T54-QA.md).

    **Прочитане в кімнаті (T47):** `GET .../rooms/{roomId}/messages` — `meta.last_read_post_id`; опційно `since_read=true` → `meta.first_unread_post_id` у межах сторінки; `POST .../rooms/{roomId}/read` з `last_read_post_id` (монотонно). Деталі — [T47-QA.md](T47-QA.md).

    **WebSocket (Laravel Reverb, протокол як у Pusher):** канал кімнати — **presence** `presence-room.{roomId}` (`Echo.join('room.{roomId}')`): авторизація через `POST /broadcasting/auth` повертає `auth` + `channel_data` (нік, `guest`, `avatar_url`, `chat_role`, `badge_color`, `chat_upload_disabled` для зареєстрованих — лише для тих, хто вже пройшов `RoomPolicy::interact`). Події **`.MessagePosted`**, **`.MessageUpdated`**, **`.MessageDeleted`**, **`.PresenceStatusUpdated`** (статус учасника online/away/inactive, T48) транслюються на той самий presence-канал. Окремо: приватний **`private-user.{userId}`** для **`.PrivateMessagePosted`** (T08) та **`.PrivateThreadCleared`** (T68).

    **Статус присутності (T48):** `GET /api/v1/rooms/{roomId}/presence-statuses?user_ids=…` — мапа `userId → status` з кешу; `POST /api/v1/rooms/{roomId}/presence-status` з `{"status":"online"|"away"|"inactive"}` — оновлення власного статусу (throttle `presence-status`). Деталі — [T48-QA.md](T48-QA.md).

    **Підказки для списку «Люди» (T49):** `GET /api/v1/rooms/{roomId}/peer-hints?user_ids=…` — стать (`male`/`female`/`other`) для **зареєстрованого** переглядача, якщо у цілі поле не приховане; **персонал модерації** додатково отримує `chat_upload_disabled` по кожній не-гостьовій цілі; **гість** отримує порожній об’єкт `data`. Ролі staff/VIP — з `chat_role` у presence / `auth/user`. Деталі — [T49-QA.md](T49-QA.md).

    **SPA:** канонічний чат — **`/chat/{roomSlug}`** (Vue); **`/chat`** без слага перенаправляє клієнтом на дефолтну публічну кімнату (узгоджено з `CHAT_DEFAULT_PUBLIC_ROOM_ID`, типово `room_id=1`). Зворотна сумісність: **`/chat?room=`** приймає `room_id` (число) або **slug** (рядок). Статичні сегменти **`/chat/admin`**, **`/chat/staff-*`** зарезервовані (не перетинаються з slug кімнат). **`/archive`** — архів (T09); **`/chat/staff-users`** (T52); **`/chat/staff-flagged`** (T60). З головної з `?history=1` після входу — перехід на архів.

    **Кімнати: slug (T153):** у БД `rooms.slug` (унікальний, `[a-z0-9-]+`); історія старих слагів у `room_slug_histories` для розв’язання застарілого сегмента в URL/API. У шляхах **`/api/v1/rooms/{roomIdOrSlug}/…`** параметр — або **числовий `room_id`**, або **поточний slug**, або **історичний slug** (останній дає `meta.slug_redirect` + `meta.canonical_slug` у `GET …/messages`). `GET /api/v1/rooms` повертає `slug` (і опційно `slug_redirect` лише коли ресурс зібрано з контексту redirect — зазвичай у списку `false`). Резерв слагів — `config/chat.php` → `reserved_chat_room_slugs`. Деталі — [T153-QA.md](T153-QA.md).

    **Архів (T09):** `GET /api/v1/archive/messages` — offset-пагінація (`page`, `per_page` ∈ {10,25,50,100}), пошук `q` (≤200 символів); деталі — [T09-QA.md](T09-QA.md).

    **Медіа (T10, T31):** `GET /api/v1/images` — пагінований список **власних** зображень чату (для модалу «мої зображення»; гість — 403); `POST /api/v1/images` (multipart, поле `image`), `GET /api/v1/images/{id}/file` — файли на диску `storage/app/chat-images` (не в `public/`); доступ до файлу за політикою (власник або повідомлення в доступній кімнаті). Повідомлення: опційний `image_id` у `POST .../messages` — [T10-QA.md](T10-QA.md), [T31-QA.md](T31-QA.md).

    **Спостережуваність (T11):** `GET /up` (liveness), `GET /health/ready` (readiness, JSON); структуровані логи — [T11-QA.md](T11-QA.md), runbook — [T11-RUNBOOK.md](T11-RUNBOOK.md).

    **Модерація MVP (T12):** таблиці `banned_ips`, `filter_words`; на `users` — `user_rank`, `mute_until`, `kick_until` — [T12-QA.md](T12-QA.md). **T53:** `filter_words` — категорія, `match_mode` (substring | whole_word), `action` (mask | reject | flag | temp_mute), `mute_minutes`; CRUD під `can:moderate`; публічні повідомлення в кімнаті — застосування правил; приват — лише маскування (mask). **T60:** `GET /api/v1/mod/flagged-messages` (throttle `mod-flagged-read`) і `PATCH /api/v1/mod/flagged-messages/{postId}` — зняття `moderation_flag_at` (`mod-actions`); деталі — [T60-QA.md](T60-QA.md).

    **Ролі чату (T21):** на `users` — `vip` (boolean), `user_rank` (0 користувач, 1 модератор, 2 адмін); `rooms.access` — `0` публічна, `1` лише зареєстровані, `≥2` VIP-кімната (доступ VIP або модератор/адмін). `POST /api/v1/mod/users/{id}/mute|kick` — `can:moderate` (`user_rank ≥ 1`, не гість); керування банами IP і словами фільтра — `can:chat-admin` (`user_rank ≥ 2`). Ліміти `chat-post` / `image-upload` залежать від ролі (гість/VIP/staff). Поля `chat_role` та `badge_color` у `User` і lookup — [T21-QA.md](T21-QA.md).

    **Персонал: користувачі (T52):** `GET|PATCH /api/v1/mod/users` та `PATCH …/profile` — **`can:chat-admin`** (лише адміністратор чату); throttle `mod-user-read` / `mod-actions`. Пошук: підрядок у `user_name`, числовий `id`, за `email` якщо в `q` є `@`; у відповіді `email` для не-гостей. `PATCH …/{id}` — `vip` та `user_rank` (ціль з нижчим рангом); `PATCH …/profile` — повний набір як `PATCH /me/profile` (без зміни e-mail/пароля). **Модератор** ці ендпоінти **не** викликає; mute/kick лишаються під `can:moderate` (`POST …/mute|kick`). Деталі — [T52-QA.md](T52-QA.md).

    **Приват і соціальне (T08, T56, T68):** `GET /api/v1/private/conversations` — у кожному елементі `unread_count` (вхідні від peer, ще не «прочитані»), у корені `meta.total_private_unread` (сума).
    `GET|POST /api/v1/private/peers/{userId}/messages`; `POST /api/v1/private/peers/{userId}/read` — позначити вхідні від peer прочитаними (throttle `private-read`, ідемпотентно).
    `DELETE /api/v1/private/peers/{userId}/thread` — видалити всю історію привату між поточним користувачем і peer (throttle `private-post`); **403** при взаємному ігнорі; подія **`.PrivateThreadCleared`** на **`private-user.{userId}`** для **обох** учасників (`peer_one_id`, `peer_two_id`, `cleared_by_user_id`).
    **Web Push (T165):** `POST|DELETE /api/v1/push/subscriptions` — зберегти / відкликати browser `PushSubscription` для **зареєстрованого** користувача; гість — **403**. Після нових повідомлень створюються чергові job для push-доставки (room / private), VAPID-ключі — лише через `.env`.
    `GET /api/v1/users/lookup` (точний нік), **`GET /api/v1/users/autocomplete?q=`** — префіксний пошук зареєстрованих для привату (T85, throttle `user-autocomplete`); ендпоінти `friends*` та `ignores*` (деталі — [T08-QA.md](T08-QA.md)); непрочитані приватні — [T56-QA.md](T56-QA.md).
    **Друзі (T50):** `GET /api/v1/friends` — усі прийняті друзі (без фільтра онлайн); `DELETE /api/v1/friends/{userId}` — прибрати з друзів або скасувати вихідний запит (throttle `private-post`).
    Подія **`.PrivateMessagePosted`** на каналі **`private-user.{recipientId}`** (авторизація як для `user.{id}` у `routes/channels.php`).

    **Модерація в межах кімнати (T58):** творець кімнати (`rooms.created_by_user_id`) може `PATCH`/`DELETE` **чужі** публічні повідомлення **лише** в цій кімнаті; не діє на пости глобального модератора/адміна. Поля `created_by_me` та `is_room_moderator` у `Room` — для UI. Деталі — [T58-QA.md](T58-QA.md).
  version: "0.19.0"
  license:
    name: Proprietary
    url: https://example.com/

servers:
  - url: /
    description: Відносно origin додатку (наприклад http://127.0.0.1:8000)

tags:
  - name: Auth
    description: Реєстрація, сесія, профіль
  - name: Chat
    description: Кімнати та публічні повідомлення (T04)
  - name: Health
    description: Liveness / readiness (T11)
  - name: Moderation
    description: Mute/kick — модератор (`user_rank ≥ 1`); бан IP і фільтр слів — адмін (`user_rank ≥ 2`), T12+T21
  - name: Private
    description: Приватні повідомлення, друзі, ігнор (T08, T50, T56, T68, T85)

paths:
  /up:
    get:
      tags: [Health]
      summary: Liveness (процес відповідає)
      description: Вбудований маршрут Laravel; HTML-відповідь. Не перевіряє БД.
      operationId: healthUp
      security: []
      responses:
        "200":
          description: OK
        "500":
          description: Помилка під час діагностики (див. подію DiagnosingHealth)

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness (БД та за потреби Redis)
      description: |
        `checks.database` завжди; `checks.redis` — якщо `HEALTH_CHECK_REDIS=true` або cache/queue на redis.
        **503** якщо `status` = `degraded`.
      operationId: healthReady
      security: []
      responses:
        "200":
          description: Усі перевірки ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"
        "503":
          description: Одна або кілька перевірок fail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"

  /api/v1/mod/banned-ips:
    get:
      tags: [Moderation]
      summary: Список заблокованих IP
      operationId: modListBannedIps
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Масив у `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModBannedIpListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Moderation]
      summary: Додати IP у бан
      operationId: modStoreBannedIp
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModBanIpRequest"
      responses:
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModBannedIpCreatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/banned-ips/{bannedIpId}:
    delete:
      tags: [Moderation]
      summary: Прибрати IP з бану
      operationId: modDestroyBannedIp
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/BannedIpId"
      responses:
        "204":
          description: Видалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/flagged-messages:
    get:
      tags: [Moderation]
      summary: Черга повідомлень з прапорцем модерації (T60)
      description: |
        `can:moderate`, throttle `mod-flagged-read`. Лише рядки з непорожнім `moderation_flag_at`.
        Відповідь без зайвого PII: уривок тексту (`snippet` до 160 символів); для видалених повідомлень `snippet` порожній, `is_deleted` true.
      operationId: modListFlaggedMessages
      security:
        - sanctumSession: []
      parameters:
        - name: room_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Фільтр за `chat.post_roomid`
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Сторінка в `data`, пагінація в `meta`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModFlaggedMessageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/flagged-messages/{message}:
    patch:
      tags: [Moderation]
      summary: Зняти прапорець модерації з повідомлення (T60)
      description: "`can:moderate`, throttle `mod-actions`. Встановлює `moderation_flag_at` у `null`."
      operationId: modClearMessageModerationFlag
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - name: message
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: "`chat.post_id`"
      responses:
        "200":
          description: Оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModClearModerationFlagResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/filter-words:
    get:
      tags: [Moderation]
      summary: Список слів фільтра / стоп-слів (T53)
      description: "`can:moderate` (модератор або адміністратор)."
      operationId: modListFilterWords
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Масив у `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModFilterWordListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Moderation]
      summary: Додати слово / правило (T53)
      description: "`can:moderate`. Поля `match_mode`, `action`, `mute_minutes` — див. схему запиту."
      operationId: modStoreFilterWord
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModFilterWordRequest"
      responses:
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModFilterWordCreatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/filter-words/{filterWordId}:
    patch:
      tags: [Moderation]
      summary: Оновити правило стоп-слова / фільтра (T53)
      description: "`can:moderate`. Хоча б одне поле в тілі."
      operationId: modPatchFilterWord
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/FilterWordId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModFilterWordPatchRequest"
      responses:
        "200":
          description: Оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModFilterWordCreatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      tags: [Moderation]
      summary: Прибрати слово з фільтра
      description: "`can:moderate`."
      operationId: modDestroyFilterWord
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/FilterWordId"
      responses:
        "204":
          description: Видалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users:
    get:
      tags: [Moderation]
      summary: Каталог / пошук користувачів для адміна чату (T52, T57)
      description: |
        `can:chat-admin`. Потрібно **одне з**: непорожній `q`, `browse=true`, або будь-який фільтр (`guest`, `user_rank`, `vip`, `muted`, `kicked`, `disabled`).
        Пошук: `instr(lower(user_name), lower(q))`, опційно `id` якщо `q` — лише цифри; збіг по `email`, якщо в `q` є `@`.
      operationId: modStaffUserSearch
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 191
        - name: browse
          in: query
          schema:
            type: boolean
            default: false
        - name: guest
          in: query
          schema:
            type: boolean
        - name: user_rank
          in: query
          schema:
            type: integer
            enum: [0, 1, 2]
        - name: vip
          in: query
          schema:
            type: boolean
        - name: muted
          in: query
          description: Активний мут зараз (`mute_until` > now)
          schema:
            type: boolean
        - name: kicked
          in: query
          description: Активний kick зараз (`kick_until` > now)
          schema:
            type: boolean
        - name: disabled
          in: query
          description: Обліковий запис вимкнено (`account_disabled_at` не null)
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, user_name, created_at]
            default: id
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Сторінка результатів
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUserSearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Moderation]
      summary: Створити зареєстрованого користувача (T57)
      description: |
        `can:chat-admin`. Якщо `password` не передано — генерується випадковий пароль; один раз повертається в `meta.generated_password`.
      operationId: modStaffUserCreate
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUserCreateRequest"
      responses:
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUserCreateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users/bulk:
    post:
      tags: [Moderation]
      summary: Масові дії над користувачами (T57)
      description: |
        `can:chat-admin`. До 50 id за запит; транзакція — усі або помилка. Для `mute`/`kick` обов’язково `minutes` (1–525600).
        Дії: `set_vip`, `clear_vip`, `set_rank` (+`user_rank`), `mute`, `clear_mute`, `kick`, `clear_kick`, `disable_account`, `enable_account`.
      operationId: modStaffUserBulk
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUserBulkRequest"
      responses:
        "200":
          description: Успіх
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUserBulkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users/{userId}:
    get:
      tags: [Moderation]
      summary: Один користувач для адміна (T57)
      description: "`can:chat-admin`."
      operationId: modStaffUserShow
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      responses:
        "200":
          description: Рядок користувача
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUserSingleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    patch:
      tags: [Moderation]
      summary: Зміна VIP, рангу та soft-disable облікового запису (T52, T57)
      description: |
        `can:chat-admin`; ціль має мати **нижчий** `user_rank`, ніж актор; не на себе.
        Новий ранг не може бути вищим за ранг актора. `account_disabled` — лише для не-гостя (встановлює `account_disabled_at`).
      operationId: modStaffUserPatchRoles
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUserRolesPatchRequest"
      responses:
        "200":
          description: Оновлений рядок користувача
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUserSingleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users/{userId}/profile:
    patch:
      tags: [Moderation]
      summary: Редагування профілю користувача адміном (T52)
      description: |
        `can:chat-admin`; ціль — зареєстрований користувач (не гість), нижчий ранг за актора.
        Повний набір полів профілю, соцмережі, звукові преференції (як `MeProfilePatchRequest`).
      operationId: modStaffUserPatchProfile
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUserProfilePatchRequest"
      responses:
        "200":
          description: Оновлений рядок користувача
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUserSingleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users/{userId}/mute:
    post:
      tags: [Moderation]
      summary: Мут користувача (хвилини; 0 або відсутнє — зняти)
      operationId: modMuteUser
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModMinutesRequest"
      responses:
        "200":
          description: Оновлені обмеження
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModUserRestrictionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users/{userId}/kick:
    post:
      tags: [Moderation]
      summary: Kick користувача (хвилини; 0 або відсутнє — зняти)
      operationId: modKickUser
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModMinutesRequest"
      responses:
        "200":
          description: Оновлені обмеження
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModUserRestrictionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users/{userId}/network-insight:
    get:
      tags: [Moderation]
      summary: Мережевий огляд користувача для персоналу (T23)
      description: |
        Джерело: останні записи таблиці `sessions` при `SESSION_DRIVER=database` (IP, user-agent останньої сесії, унікальні IP у вибірці, прапорець бану по `banned_ips`).
        Доступ лише за `can:moderate` (модератор/адмін, не гість). Ліміт `mod-network-insight`.
      operationId: modUserNetworkInsight
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      responses:
        "200":
          description: Агреговані дані без дублювання PII у логах клієнта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModUserNetworkInsightResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /sanctum/csrf-cookie:
    get:
      tags: [Auth]
      summary: Отримати CSRF cookie (перед POST з браузера)
      operationId: sanctumCsrfCookie
      security: []
      responses:
        "204":
          description: Cookie `XSRF-TOKEN` виставлено; використайте його для заголовка `X-XSRF-TOKEN`.
        "403":
          description: Доступ заборонено (наприклад, некоректний origin для stateful Sanctum).

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Реєстрація
      description: |
        Якщо в налаштуваннях чату вимкнено реєстрацію (`registration_open: false`), повертається **403** навіть при валідному тілі.
        Поле `department` — honeypot: має бути відсутнім або порожнім рядком.
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Створено; сесія відкрита
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "403":
          description: Реєстрацію вимкнено в налаштуваннях чату
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Вхід за паролем
      description: |
        **Throttle:** одночасно ліміт **5**/хв на IP (`auth-login-ip`) і **30**/хв на нормалізований `user_name` у нижньому регістрі (`auth-login-name`, спільно для всіх IP) — стримує перебір одного ніка з ботнету.
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK; сесія відкрита
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/guest:
    post:
      tags: [Auth]
      summary: Вхід як гість
      description: Throttle **12**/хв на IP (`auth-guest`).
      operationId: authGuest
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestRequest"
      responses:
        "201":
          description: Створено гостьового користувача; сесія відкрита
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Запит посилання для скидання пароля (T94)
      description: |
        Завжди **200** з однаковим `message` (немає user enumeration). Лист надсилається якщо знайдено **не-гостьовий**
        обліковий запис з валідною email і (**непорожній пароль** **або** імпорт з legacy без пароля: `legacy_imported_at` задано, `password` порожній — **T129**).
        Throttle **5**/хв на IP (`auth-forgot-password`).
      operationId: authForgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: OK (однакова відповідь незалежно від існування email)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/account-legacy-password-link:
    post:
      tags: [Auth]
      summary: Лист для встановлення пароля після імпорту legacy (T129)
      description: |
        Лише для **авторизованого** не-гостя з `legacy_imported_at` і **без** пароля в БД: надсилає той самий лист скидання, що й публічний forgot-password (**T94**).
        **422** якщо умови не виконані (не legacy / пароль уже є / немає email). Throttle **3**/хв на користувача (`auth-account-legacy-password-link`).
      operationId: authAccountLegacyPasswordLink
      security:
        - sanctumSession: []
          csrfHeader: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Гість
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          description: Брокер скидання не зміг надіслати лист

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Підтвердження нового пароля за токеном з листа (T94)
      description: |
        Після успіху інші сесії користувача в `SESSION_DRIVER=database` видаляються з таблиці `sessions`;
        персональні токени Sanctum (`personal_access_tokens`) — також. Пароль — `Password::defaults()` як у реєстрації.
        Throttle **10**/хв на IP (`auth-reset-password`).
      operationId: authResetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Пароль оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/landing:
    get:
      tags: [Auth]
      summary: Публічний зріз вітальні (T75)
      description: |
        Без автентифікації: тексти та посилання для гостьової сторінки, прапорці реєстрації (без секретів),
        приблизний лічильник користувачів з активною сесією (`SESSION_DRIVER=database`). Throttle `landing-read`.
      operationId: getLandingPublic
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingPublicResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/user:
    get:
      tags: [Auth]
      summary: Поточний користувач
      operationId: authUser
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Поточний користувач (обгортка `data`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Вихід (інвалідація сесії)
      operationId: authLogout
      security:
        - sanctumSession: []
          csrfHeader: []
      responses:
        "204":
          description: Немає тіла
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/avatar:
    post:
      tags: [Auth]
      summary: Завантажити аватар профілю
      description: |
        Лише для зареєстрованих користувачів (`guest === false`). Гість отримує **403**.
        Обмеження як у `POST /api/v1/images`: JPEG, PNG, GIF, WebP; розмір файлу — див. `max_chat_image_upload_bytes` у `GET /api/v1/chat/settings`.
        Додатково (T19): фактичний тип і декодування перевіряються за вмістом (magic bytes / `getimagesize`); максимальний розмір зображення **4096×4096 px**; MIME у БД береться з вмісту, а не лише з заголовка клієнта.
        Окремий throttle **`avatar-upload`** (нижчий за загальний `image-upload` для вкладень у чат).
        Відповідь — оновлений профіль у форматі `UserResponse` (поле `avatar_url` вказує на `GET /api/v1/images/{id}/file`).
      operationId: uploadProfileAvatar
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "201":
          description: Аватар збережено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/me/profile:
    get:
      tags: [Auth]
      summary: Профіль зареєстрованого користувача (повне тіло як UserResponse)
      description: Гість отримує **403**. Дані профілю, соцмереж та звуків збігаються з полями в `GET /api/v1/auth/user` для `guest === false`.
      operationId: getMeProfile
      security:
        - sanctumSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    patch:
      tags: [Auth]
      summary: Оновити персональні дані, соцмережі та преференції звуків
      description: Гість **403**. Часткове оновлення (лише передані блоки). Пароль і e-mail — через `PATCH /api/v1/me/account`.
      operationId: patchMeProfile
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeProfilePatchRequest"
      responses:
        "200":
          description: Оновлений користувач
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/me/account:
    patch:
      tags: [Auth]
      summary: Зміна e-mail та/або пароля
      description: |
        Лише зареєстрований користувач (**403** для гостя).
        Потрібен валідний `current_password`. Має бути вказано новий `email` (відмінний від поточного) або новий `password` (з `password_confirmation`).
        Після зміни e-mail `email_verified_at` скидається (верифікація — за політикою застосунку).
      operationId: patchMeAccount
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeAccountPatchRequest"
      responses:
        "200":
          description: Оновлений користувач
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/private/conversations:
    get:
      tags: [Private]
      summary: Список розмов (останнє повідомлення на peer)
      description: |
        Для кожного peer — останнє повідомлення в парі, `unread_count` (вхідні від peer після `last_read_incoming_message_id`),
        у `meta.total_private_unread` — сума `unread_count` по всіх рядках.
        Throttle: `private-read`.
      operationId: listPrivateConversations
      security:
        - sanctumSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateConversationsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/private/peers/{peer}/messages:
    get:
      tags: [Private]
      summary: Історія привату з peer (курсор)
      description: |
        Повідомлення в хронологічному порядку (зростання `id`) на сторінці; новіші зазвичай в кінці списку.
        Параметри: `before` (опційно, `id` верхньої межі для наступної сторінки), `limit` (1–100, типово 50).
        Після відповіді сервер позначає вхідні від peer як прочитані до поточного max(id) (**T56**).
        Throttle: `private-read`. **403** якщо пара в ігнорі. **422** якщо `peer` — поточний користувач.
      operationId: listPrivatePeerMessages
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/PeerUserId"
        - name: before
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Повернути повідомлення з `id` строго меншим за `before` (пагінація назад у часі).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateMessagesPageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Взаємний ігнор або недоступність переписки
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          description: Некоректний peer або валідація query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Private]
      summary: Надіслати приватне повідомлення peer
      description: |
        Тіло: `message` (plain text, до 4000 символів), `client_message_id` (UUID) для ідемпотентності.
        **201** — нове повідомлення; **200** з `meta.duplicate: true` — той самий `client_message_id` уже збережений для цього peer.
        **403** — ігнор або мут/кік (**UserPostingGate**). **422** — не себе, або `client_message_id` вже використано для іншого peer.
        **T125:** той самий антифлуд, що й для `POST /api/v1/rooms/{roomId}/messages` (після перевірки дубля `client_message_id`); **`429`** з **`code`: `message_flood_limit`**.
        Broadcast: `.PrivateMessagePosted` на `private-user.{recipientId}`.
        Throttle: `private-post`.
      operationId: storePrivateMessage
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/PeerUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorePrivateMessageRequest"
      responses:
        "200":
          description: Дубль за `client_message_id` (тіло як у створеного)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateMessageStoredResponse"
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateMessageStoredResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Ігнор, мут або кік
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          description: Throttle `private-post` або **T125** `message_flood_limit`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /api/v1/private/peers/{peer}/read:
    post:
      tags: [Private]
      summary: Позначити вхідні від peer прочитаними
      description: |
        Ідемпотентно оновлює `last_read_incoming_message_id` до поточного максимуму вхідних від peer.
        Throttle: `private-read`.
      operationId: markPrivatePeerRead
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/PeerUserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaOkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Ігнор
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          description: Не себе
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/private/peers/{peer}/thread:
    delete:
      tags: [Private]
      summary: Очистити всю переписку з peer (**T68**)
      description: |
        Видаляє всі повідомлення між поточним користувачем і peer та read-state; broadcast `.PrivateThreadCleared` на `private-user.{userId}` для обох.
        **403** при взаємному ігнорі. Throttle: `private-post`.
      operationId: destroyPrivateThread
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/PeerUserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivateThreadClearedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Ігнор
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          description: Не себе
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/push/subscriptions:
    post:
      tags: [Push]
      summary: Зберегти або оновити browser push subscription
      description: |
        Приймає `PushSubscription.toJSON()` з браузера плюс `contentEncoding` (за наявності).
        Лише **зареєстрований** користувач; гість отримує **403**. Повторна відправка того ж endpoint оновлює ключі/власника.
        Сервер має бути налаштований через `WEB_PUSH_VAPID_*`; інакше **503**.
        Throttle: `private-post`.
      operationId: storePushSubscription
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscriptionStoreRequest"
      responses:
        "200":
          description: Існуючий endpoint оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSubscriptionResponse"
        "201":
          description: Підписку створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSubscriptionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Гість не може керувати Web Push
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          description: Web Push ще не налаштовано на сервері
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
    delete:
      tags: [Push]
      summary: Відкликати browser push subscription
      description: |
        Ідемпотентне видалення поточного endpoint для авторизованого користувача.
        Лише **зареєстрований** користувач; гість отримує **403**. Throttle: `private-post`.
      operationId: destroyPushSubscription
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscriptionDeleteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSubscriptionDeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Гість не може керувати Web Push
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/users/autocomplete:
    get:
      tags: [Auth]
      summary: Автокомпліт ніків зареєстрованих користувачів (T85)
      description: |
        Префіксний пошук по `user_name` для поля «Почати приватний чат».
        У відповіді лише **не**-гості з активним акаунтом (`account_disabled_at` IS NULL), без поточного користувача.
        Запит до БД — `LIKE 'prefix%'` на індексованій колонці (`user_name` UNIQUE); екранування `%`, `_`, `!` у префіксі.
        Параметр **`q`**: мінімум 2 символи, максимум 64; повертається до **15** записів, відсортовано за `user_name`.
        Throttle: **`user-autocomplete`** (на користувача).
      operationId: usersAutocomplete
      security:
        - sanctumSession: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 64
          description: Префікс ніка (без глобального wildcard).
      responses:
        "200":
          description: Список кандидатів (той самий набір полів, що й у `users/lookup` → `data`)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    maxItems: 15
                    items:
                      $ref: "#/components/schemas/UserLookupPeer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/users/lookup:
    get:
      tags: [Private]
      summary: Точний пошук користувача за ніком (приват / slash)
      description: |
        Query **`name`** — точний `user_name` (до 191 символів). Повертає той самий набір полів, що й елементи `users/autocomplete` (`UserLookupPeer` у `data`).
        **404** — не знайдено. **422** — спроба вибрати себе.
      operationId: usersLookupByName
      security:
        - sanctumSession: []
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            maxLength: 191
          description: Точний нік (`users.user_name`).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/UserLookupPeer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Користувача не знайдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          description: Некоректний запит (наприклад, себе)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"

  /api/v1/oembed:
    get:
      tags: [Chat]
      summary: oEmbed-метадані через серверний проксі (T55)
      description: |
        Параметр **`url`** — публічне `http`/`https` посилання на ресурс; має відповідати **хоча б одній** схемі з реєстру провайдерів (`backend/data/oembed-providers.json`).
        Вихідний HTTP-запит виконується **лише** на `endpoint` обраного провайдера з реєстру, не на довільний хост з `url`.
        Поле **`html`** (якщо є) — лише безпечні `iframe` з білого списку хостів; `<script>` та інша розмітка відкидаються.
        Кеш на бекенді за ключем нормалізованого `url` і TTL з `cache_age` відповіді (у межах конфігу).
        Throttle: **`oembed-read`** (на користувача).
      operationId: getOembedProxy
      security:
        - sanctumSession: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            maxLength: 2048
          description: URL ресурсу для вбудовування (має матчитися реєстру oEmbed).
        - name: maxwidth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 2000
        - name: maxheight
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 2000
      responses:
        "200":
          description: Підмножина полів oEmbed JSON
          headers:
            Cache-Control:
              schema:
                type: string
              description: Напр. `private, max-age=300`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OEmbedProxyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: URL небезпечний / не з реєстру / не вдалося підібрати провайдера
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "502":
          description: Провайдер недоступний або некоректна відповідь
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/friends:
    get:
      tags: [Private]
      summary: Список прийнятих друзів (T50)
      description: Усі зв’язки зі статусом accepted; для кожного рядка — peer (`user`) і `since` (ISO 8601, `updated_at` дружби).
      operationId: listFriends
      security:
        - sanctumSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendsAcceptedListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/friends/requests/incoming:
    get:
      tags: [Private]
      summary: Вхідні запити в друзі (pending)
      description: Запити, де поточний користувач — addressee.
      operationId: listFriendRequestsIncoming
      security:
        - sanctumSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequestsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/friends/requests/outgoing:
    get:
      tags: [Private]
      summary: Вихідні запити в друзі (pending)
      description: Запити, де поточний користувач — requester.
      operationId: listFriendRequestsOutgoing
      security:
        - sanctumSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequestsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/friends/{userId}/accept:
    post:
      tags: [Private]
      summary: Прийняти вхідний запит у друзі
      description: Поточний користувач має бути addressee для pending-запиту від `userId`. **404** — немає такого запиту.
      operationId: acceptFriendRequest
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Немає pending-запиту від цього користувача
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"

  /api/v1/friends/{userId}/reject:
    post:
      tags: [Private]
      summary: Відхилити вхідний запит у друзі
      description: Статус запиту стає rejected. **404** — немає такого запиту.
      operationId: rejectFriendRequest
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Немає pending-запиту від цього користувача
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"

  /api/v1/friends/{userId}:
    post:
      tags: [Private]
      summary: Надіслати запит у друзі або повторити після відхилення (T50)
      description: |
        **422** — себе, гість як ціль, дубль pending/accepted, тощо.
        **409** — інший користувач уже надіслав вам запит (потрібно прийняти зі своєї сторони).
        **201** — створено або «Запит надіслано повторно.» (оновлення з rejected).
      operationId: storeFriendRequest
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      responses:
        "201":
          description: Запит створено або повторно надіслано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Вхідний pending-запит від цілі — прийміть його
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          description: Некоректний запит
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
    delete:
      tags: [Private]
      summary: Прибрати з друзів або скасувати запит у друзі (T50)
      description: |
        Видаляє рядок `friendships` між поточним користувачем і `userId`:
        **accepted** — прибрати з друзів; **pending** — скасувати вихідний запит або прибрати вхідний;
        **rejected** — очистити запис (можна надіслати новий запит). Не застосовується до себе (**422**).
        Обмеження частоти: `private-post` (як і змінюючі запити привату).
      operationId: destroyFriendship
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      responses:
        "200":
          description: Операція виконана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Немає рядка дружби з цим користувачем
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          description: Некоректний запит (наприклад, спроба застосувати до себе)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/ignores:
    get:
      tags: [Private]
      summary: Список ігнорованих користувачів
      description: Кожен елемент — `user` з `id` та `user_name` (ціль не гість у моделі, але поля мінімальні).
      operationId: listIgnores
      security:
        - sanctumSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IgnoreListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/ignores/{userId}:
    post:
      tags: [Private]
      summary: Додати користувача в ігнор
      description: Ідемпотентне `firstOrCreate`. **422** — спроба ігнорувати себе.
      operationId: storeIgnore
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      responses:
        "201":
          description: Додано (або вже був у списку)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Некоректна ціль
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
    delete:
      tags: [Private]
      summary: Прибрати користувача з ігнору
      description: "**404** — запису не було."
      operationId: destroyIgnore
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Запису в ігнорі немає
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"

  /api/v1/rooms:
    get:
      tags: [Chat]
      summary: Список кімнат, доступних користувачу
      description: |
        Гості — лише `access === 0`; зареєстровані без VIP — `access < 2`; VIP або staff бачать усі кімнати, до яких є `interact`.
        **T141:** без валідної автентифікації (сесія Sanctum для SPA або Bearer-токен за політикою API) — **`401`**, не внутрішня помилка сервера.
      operationId: listRooms
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Список кімнат у полі `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Chat]
      summary: Створити публічну кімнату
      description: |
        **T44:** лише **не гість**. Адміністратор, модератор і VIP можуть завжди. Звичайний зареєстрований — якщо кількість його публічних повідомлень (за `GET /api/v1/chat/settings`: область лічби та поріг **N**) **строго більша** за **N**.
        Нова кімната завжди з `access = 0` (публічна). Поле опису — `topic`.
      operationId: createRoom
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "201":
          description: Створена кімната в `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomSingleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Гість (`message` про заборону) або недостатня кількість публічних повідомлень (`code`: `room_create_insufficient_messages`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  code:
                    type: string
                    enum: [room_create_insufficient_messages]
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}:
    parameters:
      - $ref: "#/components/parameters/RoomId"
    patch:
      tags: [Chat]
      summary: Оновити кімнату (T54)
      description: |
        Лише **не гість**. Потрібен доступ `interact` до кімнати. Поля `room_name` та `topic` — **творець** (`created_by_user_id`) або **модератор/адмін**; legacy-кімнати без творця редагують лише staff.
        Поле `access` (0 / 1 / 2) — **лише модератор або адмін**. Хоча б одне поле в тілі. Throttle `room-manage`.
      operationId: patchRoom
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchRoomRequest"
      responses:
        "200":
          description: Оновлена кімната в `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomSingleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Гість, немає `interact`, або недостатньо прав на поля
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      tags: [Chat]
      summary: Видалити порожню кімнату (T54)
      description: |
        Лише **не гість**; **творець** або **модератор/адмін**; доступ `interact`. Якщо є хоча б одне повідомлення в історії — **422** (`room_has_messages`). Throttle `room-manage`.
      operationId: deleteRoom
      security:
        - sanctumSession: []
          csrfHeader: []
      responses:
        "204":
          description: Кімнату видалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Немає прав або немає доступу до кімнати
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          description: У кімнаті є повідомлення
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  code:
                    type: string
                    enum: [room_has_messages]
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/chat/settings:
    get:
      tags: [Chat]
      summary: Глобальні опції чату (зріз для клієнта)
      description: |
        Поріг **N** і область лічби публічних повідомлень для права створення кімнат (**T51** / **T44**).
        Ліміт **slash-команд** на користувача: `slash_command_max_per_window` / `slash_command_window_seconds` (див. схему `ChatSettingsData`).
        Доступно будь-якому авторизованому користувачу (у т.ч. гостю); без PII.
        **Адміністратор чату** додатково отримує `transactional_mail_from_name` та `mail_template_overrides` (**T110**); іншим ці поля **не** повертаються.
      operationId: getChatSettings
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Поточні значення
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    patch:
      tags: [Chat]
      summary: Оновити глобальні опції чату
      description: |
        Лише **адміністратор чату** (`chat-admin`).
        Опційно — **транзакційні листи** (`transactional_mail_from_name`, `mail_template_overrides`, **T110**); плейсхолдери — `docs/chat-v2/T110-MAIL-PLACEHOLDERS.md`.
      operationId: patchChatSettings
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchChatSettingsRequest"
      responses:
        "200":
          description: Оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/chat/system-bot/profile:
    get:
      tags: [Chat]
      summary: Профіль системного бота «Руда панда» (читання, T150)
      description: |
        Лише **адміністратор чату** (`can:chat-admin`), throttle `me-profile`.
        Формат тіла — `UserResponse` (як `PATCH`); для заповнення форми в адмін-UI.
      operationId: getSystemBotProfile
      security:
        - sanctumSession: []
          csrfHeader: []
      responses:
        "200":
          description: Поточний профіль бота
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Рядка бота з `is_system_bot` немає в БД
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    patch:
      tags: [Chat]
      summary: Профіль системного бота «Руда панда» (T149)
      description: |
        Лише **адміністратор чату** (`can:chat-admin`), throttle `me-profile`.
        Часткове оновлення: `user_name` (regex як у реєстрації, без пробілів) та/або блоки як у `PATCH /api/v1/me/profile`.
        Для бота **не** використовуйте `PATCH /api/v1/mod/users/{id}/profile` — поверне **422**.
        Якщо рядок бота в БД ще не створено (без сидера) — **404**.
      operationId: patchSystemBotProfile
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchSystemBotProfileRequest"
      responses:
        "200":
          description: Оновлений бот у форматі `UserResponse`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Системного користувача з `is_system_bot` не знайдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/chat/system-bot/avatar:
    post:
      tags: [Chat]
      summary: Завантажити аватар системного бота (T151)
      description: |
        Лише **адміністратор чату** (`can:chat-admin`), throttle **`avatar-upload`**.
        Поле `image` (multipart) — ті самі обмеження, що й `POST /api/v1/me/avatar` (розмір, magic bytes, 4096×4096).
        Файл прив’язується до рядка `users` з `is_system_bot = true`. Відповідь — `UserResponse` (**201**).
      operationId: postSystemBotAvatar
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "201":
          description: Аватар бота збережено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Рядка бота з `is_system_bot` немає в БД
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlainMessageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/chat/emoticons:
    get:
      tags: [Chat]
      summary: Публічний каталог смайлів (активні)
      description: |
        Список для модалу композера та клієнтського парсера `:code:` у стрічці (**T63**).
        Лише `is_active=true`, сортування `sort_order`, `id`.
      operationId: listChatEmoticons
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Масив у `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatEmoticonPublicListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/emoticons:
    get:
      tags: [Moderation]
      summary: Список смайлів (адмін)
      description: Усі записи каталогу; **`can:chat-admin`**, throttle `mod-actions`.
      operationId: modListEmoticons
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Масив у `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatEmoticonAdminListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Moderation]
      summary: Додати смайл (multipart)
      description: Поля форми + файл `file` (GIF/PNG/WebP, ≤512 КБ). **`can:chat-admin`**.
      operationId: modCreateEmoticon
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ModCreateEmoticonMultipart"
      responses:
