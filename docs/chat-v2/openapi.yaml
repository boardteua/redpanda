                $ref: "#/components/schemas/ChatEmoticonAdminOneResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/emoticons/{emoticonId}:
    patch:
      tags: [Moderation]
      summary: Оновити смайл
      description: JSON або `multipart/form-data` з опційним `file`. **`can:chat-admin`**.
      operationId: modPatchEmoticon
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - name: emoticonId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModPatchEmoticonRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ModPatchEmoticonMultipart"
      responses:
        "200":
          description: Оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatEmoticonAdminOneResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      tags: [Moderation]
      summary: Видалити запис смайла
      description: Видаляє рядок; файл з диска прибирається, якщо більше не посилається іншим записом. **`can:chat-admin`**.
      operationId: modDeleteEmoticon
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - name: emoticonId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: Видалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/archive/messages:
    get:
      tags: [Chat]
      summary: Архів публічних повідомлень (offset-пагінація)
      description: |
        Вибірка з усіх кімнат, доступних користувачу за правилом `interact` (аналогічно до `GET /api/v1/rooms`).
        Параметр `room` обмежує однією кімнатою; **403**, якщо кімната недоступна, **404**, якщо `room_id` не існує.
        Пошук `q` — підрядок у `post_message` або `post_user` (символи `%` та `_` у вводі екрануються для SQL LIKE).
      operationId: listArchiveMessages
      security:
        - sanctumSession: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 25
        - name: q
          in: query
          description: Пошук за текстом повідомлення або ніком автора
          schema:
            type: string
            maxLength: 200
        - name: room
          in: query
          description: Фільтр за `room_id`
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Сторінка повідомлень у форматі пагінації Laravel (`data`, `links`, `meta`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveMessagesPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/images:
    get:
      tags: [Chat]
      summary: Список останніх зображень поточного користувача (чат)
      description: |
        Повертає лише записи з `images.user_id` = поточний користувач, за спаданням `date_sent` та `id`.
        **Гість** — `403`. Параметр `per_page` обмежено **60** (якщо більше — обрізається). Формат відповіді — стандартна пагінація Laravel (`data`, `total`, `links`, тощо).
      operationId: listMyChatImages
      security:
        - sanctumSession: []
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 24
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Сторінка зображень
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatImagesPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Chat]
      summary: Завантажити зображення (чернетка перед повідомленням)
      description: |
        `multipart/form-data`, поле **`image`**. Дозволені MIME: `image/jpeg`, `image/png`, `image/gif`, `image/webp`.
        Максимальний розмір — **мінімум** з `max_attachment_bytes` (адмін, `GET/PATCH /api/v1/chat/settings`) та обмеження PHP `upload_max_filesize` / `post_max_size`; фактична межа в байтах — поле **`max_chat_image_upload_bytes`** у `GET /api/v1/chat/settings`. При перевищенні — **422** з поясненням у `message` / `errors`.
        Додатково (T19): перевірка **фактичного вмісту** (magic bytes + декодування) і ліміт розмірів зображення **8192×8192 px**; збережений `mime` узгоджений з вмістом.
        У відповіді — `data.id` для передачі в `POST /api/v1/rooms/{roomId}/messages` як `image_id`.
      operationId: uploadChatImage
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "201":
          description: Збережено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatImageUploadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/images/{imageId}/file:
    get:
      tags: [Chat]
      summary: Отримати файл зображення
      description: |
        Потік байтів з коректним `Content-Type`. Доступ: власник зображення або користувач з доступом до кімнати, де є повідомлення з цим `image_id` у полі `file`.
      operationId: downloadChatImageFile
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/ImageId"
      responses:
        "200":
          description: Тіло зображення
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/read:
    post:
      tags: [Chat]
      summary: Позначити прочитане до post_id (кімната)
      description: |
        Оновлює для поточного користувача пару `(user, room)` поле **останнього прочитаного** `post_id` **лише вгору** (монотонно).
        `post_id` має існувати в цій кімнаті і бути **видимим** цьому користувачу (як у `GET .../messages`).
      operationId: postRoomRead
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostRoomReadRequest"
      responses:
        "200":
          description: Поточний маркер після оновлення (або без зміни при меншому post_id)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomReadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Невідомий post_id у цій кімнаті для цього користувача
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/peer-hints:
    get:
      tags: [Chat]
      summary: Підказки профілю для списку учасників (стать, T49)
      description: |
        Для переданих `user_ids` (до 100) повертає об’єкт `data[userId]` з полем `sex` ∈ {`male`,`female`,`other`},
        якщо ціль — зареєстрований користувач, `profile_sex_hidden === false`, і значення дозволене.
        **Гість** (переглядач) завжди отримує порожній `data` (без PII). Власний id у списку ігнорується (стать «я» з `GET auth/user`).
      operationId: listRoomPeerHints
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - name: user_ids
          in: query
          required: true
          description: Ідентифікатори користувачів через кому або пробіл
          schema:
            type: string
            maxLength: 4096
      responses:
        "200":
          description: Мапа user id → { sex }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomPeerHintsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/users/{userId}/profile-card:
    get:
      tags: [Chat]
      summary: Публічна картка користувача в контексті кімнати (T148)
      description: |
        **Не гість.** Потрібен доступ `interact` до кімнати. Додатково ціль має бути «досяжна» для переглядача:
        та сама особа (`userId` = поточний користувач), персонал модерації (`canModerate`), недавній запис статусу присутності
        цілі в цій кімнаті (кеш T48 після `POST .../presence-status`), прийнята дружба або хоча б одне приватне повідомлення між сторонами.
        Інакше **403**. Повертає `User` у форматі `UserResponse`: редокція прихованих полів профілю, `email` лише для власника або staff.
      operationId: getRoomUserProfileCard
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: "`users.id` користувача, картку якого запитують"
      responses:
        "200":
          description: Картка користувача
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/presence-statuses:
    get:
      tags: [Chat]
      summary: Статуси присутності за списком user id (T48)
      description: |
        Повертає для переданих `user_ids` (до 100 id) збережені в кеші статуси **online**, **away**, **inactive**,
        якщо запис ще не прострочений (TTL з `config/chat.php`, `presence_status_ttl_seconds`).
        Використовується SPA разом з Echo presence для списку «Люди».
      operationId: listRoomPresenceStatuses
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - name: user_ids
          in: query
          required: true
          description: Ідентифікатори користувачів через кому або пробіл (напр. `1,2,5`)
          schema:
            type: string
            maxLength: 4096
      responses:
        "200":
          description: Мапа рядкових user id → статус
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomPresenceStatusesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/presence-status:
    post:
      tags: [Chat]
      summary: Оновити власний статус присутності в кімнаті (T48)
      description: |
        Зберігає статус поточного користувача в кеші та транслює **`.PresenceStatusUpdated`** на presence-канал кімнати
        (лише якщо значення змінилось). Throttle — `presence-status`.
      operationId: postRoomPresenceStatus
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostRoomPresenceStatusRequest"
      responses:
        "200":
          description: Підтвердження збереженого статусу
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomPresenceStatusPostResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/messages:
    get:
      tags: [Chat]
      summary: Історія повідомлень (сторінка)
      description: |
        Повертає до `limit` повідомлень старіших за `before` (якщо задано), у полі `data` — у **хронологічному** порядку (старі → новіші у межах сторінки).
        `meta.next_cursor` — мінімальний `post_id` у сторінці для наступного запиту «старіше».
        `meta.last_read_post_id` — збережений маркер прочитаного для цієї кімнати (`null`, якщо ще не зберігали).
        Якщо `since_read=true`, додатково `meta.first_unread_post_id` — перший `post_id` **у межах повернутої сторінки** з `post_id` > `last_read_post_id` (або `null`).
        **T153:** завжди `meta.canonical_slug` (рядок) і `meta.canonical_room_id` (int); якщо запит був за **історичним** slug — `meta.slug_redirect: true` (клієнт оновлює URL на `canonical_slug`), інакше `false`.
      operationId: listRoomMessages
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - name: before
          in: query
          description: Повернути лише повідомлення з `post_id` < `before`
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: since_read
          in: query
          description: Якщо true — додати `meta.first_unread_post_id` для поточної сторінки
          schema:
            type: boolean
      responses:
        "200":
          description: Сторінка повідомлень і `meta` (у т.ч. `last_read_post_id`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Chat]
      summary: Надіслати повідомлення
      description: |
        Ідемпотентність: повтор з тим самим `client_message_id` у **тій самій** кімнаті повертає **200** і той самий ресурс з `meta.duplicate: true`.
        Той самий ключ у **іншій** кімнаті — **422**.
        `meta.slash` завжди присутній; для відповіді-дубля — `recognized: false` (тіло повторного запиту не застосовується).
        **Slash-команди (T66, T67):** рядок після пробілів, що починається з `/` і має непорожнє ім’я команди (до першого пробілу), обробляється реєстром на бекенді;
        невідома команда зберігається як `type: client_only` (видно лише автору), без події `MessagePosted` у кімнату.
        **T67 (користувач / гість):** `/manual` — довідник (client_only); `/away` — перемикання away/online у кімнаті + broadcast `PresenceStatusUpdated`;
        `/me` — публічне «дійове» повідомлення; `/seen нік` — client_only (активність у кімнаті); `/msg нік текст` — інлайн-приват (як T25, `meta.slash.name: msg`); голий `/msg` — **422**;
        `/friend нік` — запит у друзі (client_only або помилки як у `POST /friends/{user}`); **гостю** `/friend` — **403**.
        **T68:** `/ignore нік`, `/ignoreclear` — **403** для гостя; очищення приватного треду — **`DELETE …/private/peers/{peer}/thread`** або рядок **`/clear`** у полі привату (Vue), не через `POST …/rooms/.../messages`.
        **T69 (модератор кімнати / staff):** `/mute нік [хвилини]`, `/unmute нік`, `/kick нік [хвилини]`, `/upon нік`, `/upoff нік` — **403** без `can:moderate`; цілі з вищим рангом — **403**; відповідь успіху — **`client_only`** (як інші slash). `/ban нік` — **лише адмін** (`user_rank` адміна); модератор без адмін-прав — **403** з підказкою про `/kick`; гостя як ціль — **422**. Поле **`chat_upload_disabled`** (через `/upoff|upon`) блокує **`POST /api/v1/images`**, аватар і **`image_id`** у повідомленні.
        **T70 (кімната):** `/topic текст` або `/topic` без аргументів (скинути тему) — **403** без права `updateDetails` на кімнату (творець, модератор або адмін; кімната без `created_by_user_id` — лише staff); публічний рядок у стрічці + оновлення `rooms.topic` + broadcast `RoomTopicUpdated` у `room.{id}`. `/clear` без аргументів — те саме право; **soft-delete** усіх **`type: public`** у цій кімнаті, **client_only** відповідь автору, broadcast `RoomJournalCleared`; інлайн-приват у стрічці не чіпається. Аргументи після `/clear` — **422**. Історія **`GET …/messages`** та **архів** не повертають видалені (`post_deleted_at` задано) публічні пости.
        **T72 (адмін, каталог UI-тем):** `/addtheme назва` — запис у `chat_themes` (до 64 символів; дублікат назви — **422**, зокрема різний регістр при колації utf8mb4_unicode_ci); `/deltheme назва` — видалення за збігом імені **без** урахування регістру; **403** без `can:chat-admin`; успіх — публічне системне повідомлення в стрічці (`meta.slash.name`: `addtheme` / `deltheme`). Вибір теми в UI — поза межами T72.
        Окремий ліміт slash-команд на користувача (`429`): **`slash_command_max_per_window`** спроб за **`slash_command_window_seconds`** с (див. `GET/PATCH /api/v1/chat/settings`); разом із `image_id` такі рядки **422**.
        **T125 (антифлуд повідомлень):** якщо в `GET /api/v1/chat/settings` увімкнено **`message_flood_enabled`**, після перевірки ідемпотентності `client_message_id` застосовується ліміт **`message_flood_max_messages`** за ковзне вікно **`message_flood_window_seconds`** с (кеш); **не** діє на адміна чату, модераторів і **VIP**. Перевищення — **`429`** з полем **`code`: `message_flood_limit`** (разом із `message`).
        Потрібен **непорожній** `message` (після trim) або **`image_id`** власного завантаження (`POST /api/v1/images`).
        Поле `message` — **plain text**; max довжина: гість **2000**, користувач **4000**, VIP/модератор/адмін **8000** (інакше **422**).
      operationId: postRoomMessage
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostChatMessageRequest"
      responses:
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessagePostResponseCreated"
        "200":
          description: Ідемпотентний повтор (дубль)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessagePostResponseDuplicate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Валідація або конфлікт `client_message_id` з іншою кімнатою
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorBody"
                  - $ref: "#/components/schemas/ClientIdRoomConflict"
        "429":
          description: Slash rate limit або **T125** `message_flood_limit` (див. тіло `message` / `code`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /api/v1/rooms/{roomId}/messages/{postId}:
    patch:
      tags: [Chat]
      summary: Редагувати публічне повідомлення
      description: |
        Лише `type: public`. RBAC: адмін — будь-який допис у кімнаті; модератор — будь-який, крім авторства адміністратора;
        звичайний користувач — лише власні в межах `message_edit_window_hours` з `GET /api/v1/auth/user`; VIP — власні без обмеження часу; гість — заборонено.
        Текст проходить той самий word-filter, що й при створенні. Поле `style` опційне; якщо не передано — стиль не змінюється.
        Поле `message` — **plain text**; max довжина як у `POST` (гість 2000 / користувач 4000 / VIP або staff 8000).
        **Вкладене зображення** (`file` / `image` у відповіді) цим запитом **не змінюється** і в тілі PATCH **не передається**.
        Якщо після `trim` текст порожній, запит валідний лише коли в повідомленні вже є вкладення (інакше 422).
      operationId: patchRoomMessage
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - $ref: "#/components/parameters/ChatPostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchChatMessageRequest"
      responses:
        "200":
          description: Оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessagePatchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Валідація
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      tags: [Chat]
      summary: Видалити публічне повідомлення (soft-delete)
      description: |
        Лише `type: public` (інлайн-приват — як `PATCH`, заборонено). RBAC ідентичний редагуванню (T36/T37).
        Повторний `DELETE` з тими самими правами — **200** і той самий стан (ідемпотентно), без другого broadcast.
        Тіло та вкладення очищуються; у стрічці лишається рядок-плейсхолдер (`post_deleted_at`, порожнє `post_message`).
      operationId: deleteRoomMessage
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - $ref: "#/components/parameters/ChatPostId"
      responses:
        "200":
          description: Видалено або вже було видалено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageDeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

components:
  securitySchemes:
    sanctumSession:
      type: apiKey
      in: cookie
      name: laravel_session
      description: Ім’я cookie зазвичай з `SESSION_COOKIE` у `.env` (типово `laravel_session`).
    csrfHeader:
      type: apiKey
      in: header
      name: X-XSRF-TOKEN
      description: Після `GET /sanctum/csrf-cookie` — значення з cookie `XSRF-TOKEN` (URL decode).

  parameters:
    ImageId:
      name: imageId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    BannedIpId:
      name: bannedIpId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    FilterWordId:
      name: filterWordId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    ModUserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: "`users.id` цілі"

    PeerUserId:
      name: peer
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: "`users.id` співрозмовника (peer) у приваті"

    ChatPostId:
      name: postId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: "`chat.post_id`"

    RoomId:
      name: roomId
      in: path
      required: true
      schema:
        oneOf:
          - type: integer
            minimum: 1
          - type: string
            pattern: '^[a-zA-Z0-9-]+$'
            minLength: 1
      description: |
        **T153:** первинний ключ `rooms.room_id` (ціле) **або** поточний/історичний **slug** кімнати (рядок `a-z`, `0-9`, `-`).
        Розв’язання: спочатку slug у `rooms`, потім у `room_slug_histories`, далі числовий `room_id`.

  schemas:
    RegisterRequest:
      type: object
      required: [user_name, email, password, password_confirmation]
      properties:
        user_name:
          type: string
          minLength: 2
          maxLength: 191
        email:
          type: string
          format: email
        password:
          type: string
          maxLength: 1024
        password_confirmation:
          type: string
          maxLength: 1024
        department:
          type: string
          maxLength: 0
          description: Honeypot (антиспам). Не заповнювати; лише порожній рядок або відсутнє поле.

    LoginRequest:
      type: object
      required: [user_name, password]
      properties:
        user_name:
          type: string
        password:
          type: string
          maxLength: 1024
          description: Обмеження довжини знижує ризик DoS на `Hash::check`.
        remember:
          type: boolean

    GuestRequest:
      type: object
      properties:
        user_name:
          type: string
          nullable: true
          description: Якщо null/відсутнє — сервер генерує нік.

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [email, token, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
          description: Токен з листа (plain, не хеш)
        password:
          type: string
          maxLength: 1024
        password_confirmation:
          type: string
          maxLength: 1024

    ApiPlainMessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Людськочитаний текст для UI або логів

    UserProfile:
      type: object
      description: |
        Лише для `guest === false` у `User`.
        Для **стороннього** переглядача (не власник і не персонал з `canModerate`) значення полів,
        позначених прихованими у БД, у відповіді **`null`**; прапорці `*_hidden` у такому випадку
        **завжди `false`**, щоб не розкривати факт приховування. Власник і модератор/адмін бачать
        повні значення та реальні `*_hidden`.
      properties:
        country:
          type: string
          nullable: true
          description: ISO 3166-1 alpha-2 (два символи A–Z), напр. UA, PL; null якщо не обрано
        region:
          type: string
