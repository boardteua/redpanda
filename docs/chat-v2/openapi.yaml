    ChatSettingsData:
      type: object
      required:
        - message_edit_window_hours
        - room_create_min_public_messages
        - public_message_count_scope
        - slash_command_max_per_window
        - slash_command_window_seconds
        - mod_slash_default_mute_minutes
        - mod_slash_default_kick_minutes
        - silent_mode
        - sound_on_every_post
        - message_flood_enabled
        - message_flood_max_messages
        - message_flood_window_seconds
        - max_attachment_bytes
        - max_chat_image_upload_bytes
        - landing_settings
        - registration_flags
      properties:
        message_edit_window_hours:
          type: integer
          minimum: 0
          maximum: 8760
          description: |
            Скільки годин після відправки звичайний зареєстрований може редагувати або видаляти **власне** публічне повідомлення (**T36/T37/T122**).
            Значення з БД (якщо задано адміном через `PATCH /api/v1/chat/settings`) переважає над `CHAT_MESSAGE_EDIT_WINDOW_HOURS` у env; якщо в БД `null` — використовується env/config.
            **0** — нульове вікно (фактична заборона для звичайного користувача). **VIP** і **staff** (модератор/адмін) не обмежені цим полем.
        room_create_min_public_messages:
          type: integer
          minimum: 0
          description: Мінімальна кількість публічних повідомлень; право створення кімнати при лічильнику **> N** (**T44**).
        public_message_count_scope:
          type: string
          enum: [all_public_rooms, default_room_only]
          description: Усі публічні кімнати vs одна обрана кімната для лічби.
        message_count_room_id:
          type: integer
          nullable: true
          description: Якщо scope = `default_room_only` — `room_id` публічної кімнати; інакше null.
        slash_command_max_per_window:
          type: integer
          minimum: 1
          maximum: 65535
          description: Скільки разів за вікно можна ініціювати обробку slash-команди (`/` + непорожня назва) на одного користувача.
        slash_command_window_seconds:
          type: integer
          minimum: 10
          maximum: 86400
          description: Тривалість вікна ліміту slash-команд у секундах (разом із `slash_command_max_per_window` — `RateLimiter` на бекенді).
        mod_slash_default_mute_minutes:
          type: integer
          minimum: 1
          maximum: 525600
          description: Дефолтні хвилини для slash `/mute нік` без другого аргументу (**T69**); змінює лише **адмін** (`PATCH /api/v1/chat/settings`).
        mod_slash_default_kick_minutes:
          type: integer
          minimum: 1
          maximum: 525600
          description: Дефолтні хвилини для slash `/kick нік` без другого аргументу (**T69**).
        silent_mode:
          type: boolean
          description: Глобальне приглушення звуків чату (**T71**); slash `/silent On|Off` або `PATCH` адміном.
        sound_on_every_post:
          type: boolean
          description: Legacy-опція «звук на кожен пост» (**T75**); клієнтський newpost (див. T65).
        message_flood_enabled:
          type: boolean
          description: |
            **T125:** увімкнути продуктовий ліміт частоти **звичайних** повідомлень (кімната та приват) на користувача.
            **Не** застосовується до адміністратора чату, модераторів і **VIP**; ідемпотентний повтор з тим самим `client_message_id` **не** споживає квоту.
        message_flood_max_messages:
          type: integer
          minimum: 1
          maximum: 65535
          description: Максимум відправок за ковзне вікно `message_flood_window_seconds` (**T125**).
        message_flood_window_seconds:
          type: integer
          minimum: 1
          maximum: 86400
          description: Тривалість ковзного вікна лічби в секундах (**T125**); лічильники в кеші з TTL.
        max_attachment_bytes:
          type: integer
          minimum: 1024
          description: Ліміт розміру вкладення в чат (байти), задає **адмін** (**T86**); верхня межа в застосунку — 100 MiB; PHP може обмежити нижче.
        max_chat_image_upload_bytes:
          type: integer
          minimum: 1
          description: Фактична межа для `POST /api/v1/images` — `min(max_attachment_bytes, PHP upload_max_filesize)`; для перевірки на клієнті перед відправкою.
        landing_settings:
          $ref: "#/components/schemas/LandingSettingsPayload"
        registration_flags:
          $ref: "#/components/schemas/RegistrationFlagsPayload"
        transactional_mail_from_name:
          type: string
          nullable: true
          maxLength: 120
          description: Лише якщо запит від **адміна**; ім’я відправника (адреса лишається з `MAIL_FROM_ADDRESS`).
        mail_template_overrides:
          type: object
          description: Лише якщо запит від **адміна**; усі три ключа завжди присутні у відповіді адміна.
          properties:
            password_reset:
              $ref: "#/components/schemas/MailTemplateOverrideBlock"
            welcome_registered:
              $ref: "#/components/schemas/MailTemplateOverrideBlock"
            account_security_notice:
              $ref: "#/components/schemas/MailTemplateOverrideBlock"

