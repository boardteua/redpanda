openapi: 3.0.3
info:
  title: redpanda Chat v2 API
  description: |
    HTTP API для чату v2 (Laravel backend у каталозі `backend/`).

    **Sanctum SPA (cookie):** для браузерного клієнта з того ж сайту спочатку викликайте `GET /sanctum/csrf-cookie` з `credentials: include`,
    потім передавайте заголовок `X-XSRF-TOKEN` (значення з cookie `XSRF-TOKEN`, URL-decoded) на всі **змінюючі** запити (`POST` тощо) разом з cookie сесії.
    Див. також [T03-QA.md](T03-QA.md).

    **Вміст повідомлень:** поля `post_message`, `post_user`, `topic` повертаються як сирі рядки **plain text** (не HTML); клієнт має рендерити їх як **текст** (наприклад інтерполяція в шаблоні), а не як розмітку,
    доки окремо не впроваджено санітизацію (див. [T04-QA.md](T04-QA.md)). Тіло запиту `message` у `POST`/`PATCH` кімнатних повідомлень — також **plain text**; максимальна довжина залежить від ролі: **гість 2000**, **звичайний користувач 4000**, **VIP / модератор / адмін 8000** символів (див. валідацію Laravel).

    **Обмеження частоти:** див. опис відповідей `429` і реалізацію у `AppServiceProvider` (`auth-*`, `chat-read`, `chat-mark-read`, `chat-post`, `archive-read`, `image-upload`, `image-read`, `private-*`, `mod-actions`, `presence-status`).

    **Прочитане в кімнаті (T47):** `GET .../rooms/{roomId}/messages` — `meta.last_read_post_id`; опційно `since_read=true` → `meta.first_unread_post_id` у межах сторінки; `POST .../rooms/{roomId}/read` з `last_read_post_id` (монотонно). Деталі — [T47-QA.md](T47-QA.md).

    **WebSocket (Laravel Reverb, протокол як у Pusher):** канал кімнати — **presence** `presence-room.{roomId}` (`Echo.join('room.{roomId}')`): авторизація через `POST /broadcasting/auth` повертає `auth` + `channel_data` (нік, `guest`, `avatar_url`, `chat_role`, `badge_color` — лише для тих, хто вже пройшов `RoomPolicy::interact`). Події **`.MessagePosted`**, **`.MessageUpdated`**, **`.MessageDeleted`**, **`.PresenceStatusUpdated`** (статус учасника online/away/inactive, T48) транслюються на той самий presence-канал. Окремо: приватний **`private-user.{userId}`** для **`.PrivateMessagePosted`** (T08).

    **Статус присутності (T48):** `GET /api/v1/rooms/{roomId}/presence-statuses?user_ids=…` — мапа `userId → status` з кешу; `POST /api/v1/rooms/{roomId}/presence-status` з `{"status":"online"|"away"|"inactive"}` — оновлення власного статусу (throttle `presence-status`). Деталі — [T48-QA.md](T48-QA.md).

    **Підказки для списку «Люди» (T49):** `GET /api/v1/rooms/{roomId}/peer-hints?user_ids=…` — стать (`male`/`female`/`other`) лише для **зареєстрованого** переглядача, якщо у цілі поле не приховане; **гість** отримує порожній об’єкт `data`. Ролі staff/VIP — з `chat_role` у presence / `auth/user`. Деталі — [T49-QA.md](T49-QA.md).

    **SPA:** маршрут **`/chat`** (Vue) — стрічка кімнати з Echo + poll fallback; **`/archive`** — архів (таблиця, пагінація, пошук, T09). З головної з `?history=1` після входу — перехід на архів.

    **Архів (T09):** `GET /api/v1/archive/messages` — offset-пагінація (`page`, `per_page` ∈ {10,25,50,100}), пошук `q` (≤200 символів); деталі — [T09-QA.md](T09-QA.md).

    **Медіа (T10, T31):** `GET /api/v1/images` — пагінований список **власних** зображень чату (для модалу «мої зображення»; гість — 403); `POST /api/v1/images` (multipart, поле `image`), `GET /api/v1/images/{id}/file` — файли на диску `storage/app/chat-images` (не в `public/`); доступ до файлу за політикою (власник або повідомлення в доступній кімнаті). Повідомлення: опційний `image_id` у `POST .../messages` — [T10-QA.md](T10-QA.md), [T31-QA.md](T31-QA.md).

    **Спостережуваність (T11):** `GET /up` (liveness), `GET /health/ready` (readiness, JSON); структуровані логи — [T11-QA.md](T11-QA.md), runbook — [T11-RUNBOOK.md](T11-RUNBOOK.md).

    **Модерація MVP (T12):** таблиці `banned_ips`, `filter_words`; на `users` — `user_rank`, `mute_until`, `kick_until` — [T12-QA.md](T12-QA.md).

    **Ролі чату (T21):** на `users` — `vip` (boolean), `user_rank` (0 користувач, 1 модератор, 2 адмін); `rooms.access` — `0` публічна, `1` лише зареєстровані, `≥2` VIP-кімната (доступ VIP або модератор/адмін). `POST /api/v1/mod/users/{id}/mute|kick` — `can:moderate` (`user_rank ≥ 1`, не гість); керування банами IP і словами фільтра — `can:chat-admin` (`user_rank ≥ 2`). Ліміти `chat-post` / `image-upload` залежать від ролі (гість/VIP/staff). Поля `chat_role` та `badge_color` у `User` і lookup — [T21-QA.md](T21-QA.md).

    **Приват і соціальне (T08):** `GET /api/v1/private/conversations`, `GET|POST /api/v1/private/peers/{userId}/messages`,
    `GET /api/v1/users/lookup`, ендпоінти `friends*` та `ignores*` (деталі та сценарії — [T08-QA.md](T08-QA.md)).
    Подія **`.PrivateMessagePosted`** на каналі **`private-user.{recipientId}`** (авторизація як для `user.{id}` у `routes/channels.php`).
  version: "0.16.0"
  license:
    name: Proprietary
    url: https://example.com/

servers:
  - url: /
    description: Відносно origin додатку (наприклад http://127.0.0.1:8000)

tags:
  - name: Auth
    description: Реєстрація, сесія, профіль
  - name: Chat
    description: Кімнати та публічні повідомлення (T04)
  - name: Health
    description: Liveness / readiness (T11)
  - name: Moderation
    description: Mute/kick — модератор (`user_rank ≥ 1`); бан IP і фільтр слів — адмін (`user_rank ≥ 2`), T12+T21

paths:
  /up:
    get:
      tags: [Health]
      summary: Liveness (процес відповідає)
      description: Вбудований маршрут Laravel; HTML-відповідь. Не перевіряє БД.
      operationId: healthUp
      security: []
      responses:
        "200":
          description: OK
        "500":
          description: Помилка під час діагностики (див. подію DiagnosingHealth)

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness (БД та за потреби Redis)
      description: |
        `checks.database` завжди; `checks.redis` — якщо `HEALTH_CHECK_REDIS=true` або cache/queue на redis.
        **503** якщо `status` = `degraded`.
      operationId: healthReady
      security: []
      responses:
        "200":
          description: Усі перевірки ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"
        "503":
          description: Одна або кілька перевірок fail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"

  /api/v1/mod/banned-ips:
    get:
      tags: [Moderation]
      summary: Список заблокованих IP
      operationId: modListBannedIps
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Масив у `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModBannedIpListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Moderation]
      summary: Додати IP у бан
      operationId: modStoreBannedIp
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModBanIpRequest"
      responses:
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModBannedIpCreatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/banned-ips/{bannedIpId}:
    delete:
      tags: [Moderation]
      summary: Прибрати IP з бану
      operationId: modDestroyBannedIp
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/BannedIpId"
      responses:
        "204":
          description: Видалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/filter-words:
    get:
      tags: [Moderation]
      summary: Список слів фільтра
      operationId: modListFilterWords
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Масив у `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModFilterWordListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Moderation]
      summary: Додати слово у фільтр
      operationId: modStoreFilterWord
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModFilterWordRequest"
      responses:
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModFilterWordCreatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/filter-words/{filterWordId}:
    delete:
      tags: [Moderation]
      summary: Прибрати слово з фільтра
      operationId: modDestroyFilterWord
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/FilterWordId"
      responses:
        "204":
          description: Видалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users/{userId}/mute:
    post:
      tags: [Moderation]
      summary: Мут користувача (хвилини; 0 або відсутнє — зняти)
      operationId: modMuteUser
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModMinutesRequest"
      responses:
        "200":
          description: Оновлені обмеження
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModUserRestrictionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/mod/users/{userId}/kick:
    post:
      tags: [Moderation]
      summary: Kick користувача (хвилини; 0 або відсутнє — зняти)
      operationId: modKickUser
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/ModUserId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModMinutesRequest"
      responses:
        "200":
          description: Оновлені обмеження
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModUserRestrictionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /sanctum/csrf-cookie:
    get:
      tags: [Auth]
      summary: Отримати CSRF cookie (перед POST з браузера)
      operationId: sanctumCsrfCookie
      security: []
      responses:
        "204":
          description: Cookie `XSRF-TOKEN` виставлено; використайте його для заголовка `X-XSRF-TOKEN`.
        "403":
          description: Доступ заборонено (наприклад, некоректний origin для stateful Sanctum).

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Реєстрація
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Створено; сесія відкрита
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Вхід за паролем
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK; сесія відкрита
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/guest:
    post:
      tags: [Auth]
      summary: Вхід як гість
      operationId: authGuest
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestRequest"
      responses:
        "201":
          description: Створено гостьового користувача; сесія відкрита
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/user:
    get:
      tags: [Auth]
      summary: Поточний користувач
      operationId: authUser
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Поточний користувач (обгортка `data`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Вихід (інвалідація сесії)
      operationId: authLogout
      security:
        - sanctumSession: []
          csrfHeader: []
      responses:
        "204":
          description: Немає тіла
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/avatar:
    post:
      tags: [Auth]
      summary: Завантажити аватар профілю
      description: |
        Лише для зареєстрованих користувачів (`guest === false`). Гість отримує **403**.
        Обмеження як у `POST /api/v1/images`: JPEG, PNG, GIF, WebP; max 4 МБ.
        Відповідь — оновлений профіль у форматі `UserResponse` (поле `avatar_url` вказує на `GET /api/v1/images/{id}/file`).
      operationId: uploadProfileAvatar
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "201":
          description: Аватар збережено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/me/profile:
    get:
      tags: [Auth]
      summary: Профіль зареєстрованого користувача (повне тіло як UserResponse)
      description: Гість отримує **403**. Дані профілю, соцмереж та звуків збігаються з полями в `GET /api/v1/auth/user` для `guest === false`.
      operationId: getMeProfile
      security:
        - sanctumSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    patch:
      tags: [Auth]
      summary: Оновити персональні дані, соцмережі та преференції звуків
      description: Гість **403**. Часткове оновлення (лише передані блоки). Пароль і e-mail — через `PATCH /api/v1/me/account`.
      operationId: patchMeProfile
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeProfilePatchRequest"
      responses:
        "200":
          description: Оновлений користувач
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/me/account:
    patch:
      tags: [Auth]
      summary: Зміна e-mail та/або пароля
      description: |
        Лише зареєстрований користувач (**403** для гостя).
        Потрібен валідний `current_password`. Має бути вказано новий `email` (відмінний від поточного) або новий `password` (з `password_confirmation`).
        Після зміни e-mail `email_verified_at` скидається (верифікація — за політикою застосунку).
      operationId: patchMeAccount
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeAccountPatchRequest"
      responses:
        "200":
          description: Оновлений користувач
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms:
    get:
      tags: [Chat]
      summary: Список кімнат, доступних користувачу
      description: Гості — лише `access === 0`; зареєстровані без VIP — `access < 2`; VIP або staff бачать усі кімнати, до яких є `interact`.
      operationId: listRooms
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Список кімнат у полі `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Chat]
      summary: Створити публічну кімнату
      description: |
        **T44:** лише **не гість**. Адміністратор, модератор і VIP можуть завжди. Звичайний зареєстрований — якщо кількість його публічних повідомлень (за `GET /api/v1/chat/settings`: область лічби та поріг **N**) **строго більша** за **N**.
        Нова кімната завжди з `access = 0` (публічна). Поле опису — `topic`.
      operationId: createRoom
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "201":
          description: Створена кімната в `data`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomSingleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Гість (`message` про заборону) або недостатня кількість публічних повідомлень (`code`: `room_create_insufficient_messages`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  code:
                    type: string
                    enum: [room_create_insufficient_messages]
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/chat/settings:
    get:
      tags: [Chat]
      summary: Глобальні опції чату (зріз для клієнта)
      description: |
        Поріг **N** і область лічби публічних повідомлень для права створення кімнат (**T51** / **T44**).
        Доступно будь-якому авторизованому користувачу (у т.ч. гостю); без PII.
      operationId: getChatSettings
      security:
        - sanctumSession: []
      responses:
        "200":
          description: Поточні значення
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    patch:
      tags: [Chat]
      summary: Оновити глобальні опції чату
      description: Лише **адміністратор чату** (`chat-admin`).
      operationId: patchChatSettings
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchChatSettingsRequest"
      responses:
        "200":
          description: Оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/archive/messages:
    get:
      tags: [Chat]
      summary: Архів публічних повідомлень (offset-пагінація)
      description: |
        Вибірка з усіх кімнат, доступних користувачу за правилом `interact` (аналогічно до `GET /api/v1/rooms`).
        Параметр `room` обмежує однією кімнатою; **403**, якщо кімната недоступна, **404**, якщо `room_id` не існує.
        Пошук `q` — підрядок у `post_message` або `post_user` (символи `%` та `_` у вводі екрануються для SQL LIKE).
      operationId: listArchiveMessages
      security:
        - sanctumSession: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 25
        - name: q
          in: query
          description: Пошук за текстом повідомлення або ніком автора
          schema:
            type: string
            maxLength: 200
        - name: room
          in: query
          description: Фільтр за `room_id`
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Сторінка повідомлень у форматі пагінації Laravel (`data`, `links`, `meta`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveMessagesPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/images:
    get:
      tags: [Chat]
      summary: Список останніх зображень поточного користувача (чат)
      description: |
        Повертає лише записи з `images.user_id` = поточний користувач, за спаданням `date_sent` та `id`.
        **Гість** — `403`. Параметр `per_page` обмежено **60** (якщо більше — обрізається). Формат відповіді — стандартна пагінація Laravel (`data`, `total`, `links`, тощо).
      operationId: listMyChatImages
      security:
        - sanctumSession: []
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 24
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Сторінка зображень
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatImagesPaginatedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Chat]
      summary: Завантажити зображення (чернетка перед повідомленням)
      description: |
        `multipart/form-data`, поле **`image`**. Дозволені MIME: `image/jpeg`, `image/png`, `image/gif`, `image/webp`; максимум **4096 КБ**.
        У відповіді — `data.id` для передачі в `POST /api/v1/rooms/{roomId}/messages` як `image_id`.
      operationId: uploadChatImage
      security:
        - sanctumSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "201":
          description: Збережено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatImageUploadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/images/{imageId}/file:
    get:
      tags: [Chat]
      summary: Отримати файл зображення
      description: |
        Потік байтів з коректним `Content-Type`. Доступ: власник зображення або користувач з доступом до кімнати, де є повідомлення з цим `image_id` у полі `file`.
      operationId: downloadChatImageFile
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/ImageId"
      responses:
        "200":
          description: Тіло зображення
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/read:
    post:
      tags: [Chat]
      summary: Позначити прочитане до post_id (кімната)
      description: |
        Оновлює для поточного користувача пару `(user, room)` поле **останнього прочитаного** `post_id` **лише вгору** (монотонно).
        `post_id` має існувати в цій кімнаті і бути **видимим** цьому користувачу (як у `GET .../messages`).
      operationId: postRoomRead
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostRoomReadRequest"
      responses:
        "200":
          description: Поточний маркер після оновлення (або без зміни при меншому post_id)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomReadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Невідомий post_id у цій кімнаті для цього користувача
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/peer-hints:
    get:
      tags: [Chat]
      summary: Підказки профілю для списку учасників (стать, T49)
      description: |
        Для переданих `user_ids` (до 100) повертає об’єкт `data[userId]` з полем `sex` ∈ {`male`,`female`,`other`},
        якщо ціль — зареєстрований користувач, `profile_sex_hidden === false`, і значення дозволене.
        **Гість** (переглядач) завжди отримує порожній `data` (без PII). Власний id у списку ігнорується (стать «я» з `GET auth/user`).
      operationId: listRoomPeerHints
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - name: user_ids
          in: query
          required: true
          description: Ідентифікатори користувачів через кому або пробіл
          schema:
            type: string
            maxLength: 4096
      responses:
        "200":
          description: Мапа user id → { sex }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomPeerHintsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/presence-statuses:
    get:
      tags: [Chat]
      summary: Статуси присутності за списком user id (T48)
      description: |
        Повертає для переданих `user_ids` (до 100 id) збережені в кеші статуси **online**, **away**, **inactive**,
        якщо запис ще не прострочений (TTL з `config/chat.php`, `presence_status_ttl_seconds`).
        Використовується SPA разом з Echo presence для списку «Люди».
      operationId: listRoomPresenceStatuses
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - name: user_ids
          in: query
          required: true
          description: Ідентифікатори користувачів через кому або пробіл (напр. `1,2,5`)
          schema:
            type: string
            maxLength: 4096
      responses:
        "200":
          description: Мапа рядкових user id → статус
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomPresenceStatusesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/presence-status:
    post:
      tags: [Chat]
      summary: Оновити власний статус присутності в кімнаті (T48)
      description: |
        Зберігає статус поточного користувача в кеші та транслює **`.PresenceStatusUpdated`** на presence-канал кімнати
        (лише якщо значення змінилось). Throttle — `presence-status`.
      operationId: postRoomPresenceStatus
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostRoomPresenceStatusRequest"
      responses:
        "200":
          description: Підтвердження збереженого статусу
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomPresenceStatusPostResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/messages:
    get:
      tags: [Chat]
      summary: Історія повідомлень (сторінка)
      description: |
        Повертає до `limit` повідомлень старіших за `before` (якщо задано), у полі `data` — у **хронологічному** порядку (старі → новіші у межах сторінки).
        `meta.next_cursor` — мінімальний `post_id` у сторінці для наступного запиту «старіше».
        `meta.last_read_post_id` — збережений маркер прочитаного для цієї кімнати (`null`, якщо ще не зберігали).
        Якщо `since_read=true`, додатково `meta.first_unread_post_id` — перший `post_id` **у межах повернутої сторінки** з `post_id` > `last_read_post_id` (або `null`).
      operationId: listRoomMessages
      security:
        - sanctumSession: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - name: before
          in: query
          description: Повернути лише повідомлення з `post_id` < `before`
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: since_read
          in: query
          description: Якщо true — додати `meta.first_unread_post_id` для поточної сторінки
          schema:
            type: boolean
      responses:
        "200":
          description: Сторінка повідомлень і `meta` (у т.ч. `last_read_post_id`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Chat]
      summary: Надіслати повідомлення
      description: |
        Ідемпотентність: повтор з тим самим `client_message_id` у **тій самій** кімнаті повертає **200** і той самий ресурс з `meta.duplicate: true`.
        Той самий ключ у **іншій** кімнаті — **422**.
        `meta.slash` завжди присутній; для відповіді-дубля — `recognized: false` (тіло повторного запиту не застосовується).
        Потрібен **непорожній** `message` (після trim) або **`image_id`** власного завантаження (`POST /api/v1/images`).
        Поле `message` — **plain text**; max довжина: гість **2000**, користувач **4000**, VIP/модератор/адмін **8000** (інакше **422**).
      operationId: postRoomMessage
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostChatMessageRequest"
      responses:
        "201":
          description: Створено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessagePostResponseCreated"
        "200":
          description: Ідемпотентний повтор (дубль)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessagePostResponseDuplicate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Валідація або конфлікт `client_message_id` з іншою кімнатою
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorBody"
                  - $ref: "#/components/schemas/ClientIdRoomConflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/rooms/{roomId}/messages/{postId}:
    patch:
      tags: [Chat]
      summary: Редагувати публічне повідомлення
      description: |
        Лише `type: public`. RBAC: адмін — будь-який допис у кімнаті; модератор — будь-який, крім авторства адміністратора;
        звичайний користувач — лише власні в межах `message_edit_window_hours` з `GET /api/v1/auth/user`; VIP — власні без обмеження часу; гість — заборонено.
        Текст проходить той самий word-filter, що й при створенні. Поле `style` опційне; якщо не передано — стиль не змінюється.
        Поле `message` — **plain text**; max довжина як у `POST` (гість 2000 / користувач 4000 / VIP або staff 8000).
        **Вкладене зображення** (`file` / `image` у відповіді) цим запитом **не змінюється** і в тілі PATCH **не передається**.
        Якщо після `trim` текст порожній, запит валідний лише коли в повідомленні вже є вкладення (інакше 422).
      operationId: patchRoomMessage
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - $ref: "#/components/parameters/ChatPostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchChatMessageRequest"
      responses:
        "200":
          description: Оновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessagePatchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Валідація
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      tags: [Chat]
      summary: Видалити публічне повідомлення (soft-delete)
      description: |
        Лише `type: public` (інлайн-приват — як `PATCH`, заборонено). RBAC ідентичний редагуванню (T36/T37).
        Повторний `DELETE` з тими самими правами — **200** і той самий стан (ідемпотентно), без другого broadcast.
        Тіло та вкладення очищуються; у стрічці лишається рядок-плейсхолдер (`post_deleted_at`, порожнє `post_message`).
      operationId: deleteRoomMessage
      security:
        - sanctumSession: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - $ref: "#/components/parameters/ChatPostId"
      responses:
        "200":
          description: Видалено або вже було видалено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageDeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

components:
  securitySchemes:
    sanctumSession:
      type: apiKey
      in: cookie
      name: laravel_session
      description: Ім’я cookie зазвичай з `SESSION_COOKIE` у `.env` (типово `laravel_session`).
    csrfHeader:
      type: apiKey
      in: header
      name: X-XSRF-TOKEN
      description: Після `GET /sanctum/csrf-cookie` — значення з cookie `XSRF-TOKEN` (URL decode).

  parameters:
    ImageId:
      name: imageId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    BannedIpId:
      name: bannedIpId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    FilterWordId:
      name: filterWordId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

    ModUserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: `users.id` цілі

    ChatPostId:
      name: postId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: `chat.post_id`

    RoomId:
      name: roomId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Первинний ключ `rooms.room_id`

  schemas:
    RegisterRequest:
      type: object
      required: [user_name, email, password, password_confirmation]
      properties:
        user_name:
          type: string
          minLength: 2
          maxLength: 191
        email:
          type: string
          format: email
        password:
          type: string
        password_confirmation:
          type: string

    LoginRequest:
      type: object
      required: [user_name, password]
      properties:
        user_name:
          type: string
        password:
          type: string
        remember:
          type: boolean

    GuestRequest:
      type: object
      properties:
        user_name:
          type: string
          nullable: true
          description: Якщо null/відсутнє — сервер генерує нік.

    UserProfile:
      type: object
      description: Лише для `guest === false` у `User`
      properties:
        country:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true
          minimum: 13
          maximum: 120
        sex:
          type: string
          nullable: true
          enum: [male, female, other, prefer_not]
        country_hidden:
          type: boolean
        region_hidden:
          type: boolean
        age_hidden:
          type: boolean
        sex_hidden:
          type: boolean
        occupation:
          type: string
          nullable: true
        about:
          type: string
          nullable: true

    SocialLinks:
      type: object
      description: Рядки-посилання або ніки; порожні значення допустимі
      properties:
        facebook: { type: string, maxLength: 500 }
        instagram: { type: string, maxLength: 500 }
        telegram: { type: string, maxLength: 500 }
        twitter: { type: string, maxLength: 500 }
        youtube: { type: string, maxLength: 500 }
        tiktok: { type: string, maxLength: 500 }
        discord: { type: string, maxLength: 500 }
        website: { type: string, maxLength: 500 }

    NotificationSoundPrefs:
      type: object
      properties:
        public_messages:
          type: boolean
        mentions:
          type: boolean
        private:
          type: boolean
        volume_percent:
          type: integer
          minimum: 0
          maximum: 100

    MeProfilePatchRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        social_links:
          $ref: "#/components/schemas/SocialLinks"
        notification_sound_prefs:
          $ref: "#/components/schemas/NotificationSoundPrefs"

    MeAccountPatchRequest:
      type: object
      required: [current_password]
      properties:
        current_password:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        password_confirmation:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        user_name:
          type: string
        guest:
          type: boolean
        email:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
          description: URL аватарки профілю (`GET /api/v1/images/{id}/file`); null якщо не завантажено
        chat_role:
          type: string
          enum: [guest, user, vip, moderator, admin]
          description: Роль для UI (staff має пріоритет над VIP)
        badge_color:
          type: string
          nullable: true
          description: "Колір плашки: адмін `#1a1a1a`, мод `#16a34a`, VIP `#ea580c`; null для guest/user"
        profile:
          allOf:
            - $ref: "#/components/schemas/UserProfile"
          nullable: true
          description: Лише якщо `guest === false`
        social_links:
          allOf:
            - $ref: "#/components/schemas/SocialLinks"
          nullable: true
        notification_sound_prefs:
          allOf:
            - $ref: "#/components/schemas/NotificationSoundPrefs"
          nullable: true
        message_edit_window_hours:
          type: integer
          minimum: 1
          description: Години, протягом яких звичайний користувач може редагувати власні публічні повідомлення (T36); лише якщо `guest === false`
        can_create_room:
          type: boolean
          description: Чи дозволено поточному користувачу `POST /api/v1/rooms` (**T44**); лише якщо `guest === false`

    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/User"

    Room:
      type: object
      properties:
        room_id:
          type: integer
        room_name:
          type: string
        topic:
          type: string
          nullable: true
        access:
          type: integer
          description: "0 — усі авторизовані (гості дозволені); 1 — лише зареєстровані; ≥2 — VIP-кімната (VIP або модератор/адмін)"

    HealthReadyResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, fail]
          description: Мінімум `database`; опційно `redis`

    ModBanIpRequest:
      type: object
      required: [ip]
      properties:
        ip:
          type: string
          description: IPv4 або IPv6

    ModBannedIpRow:
      type: object
      properties:
        id:
          type: integer
        ip:
          type: string
        created_at:
          type: string
          format: date-time

    ModBannedIpListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModBannedIpRow"

    ModBannedIpCreatedResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ModBannedIpRow"

    ModFilterWordRequest:
      type: object
      required: [word]
      properties:
        word:
          type: string
          minLength: 2
          maxLength: 191

    ModFilterWordRow:
      type: object
      properties:
        id:
          type: integer
        word:
          type: string
        created_at:
          type: string
          format: date-time

    ModFilterWordListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModFilterWordRow"

    ModFilterWordCreatedResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ModFilterWordRow"

    ModMinutesRequest:
      type: object
      properties:
        minutes:
          type: integer
          minimum: 0
          maximum: 525600
          nullable: true
          description: Тривалість; 0 або пропуск — зняти обмеження

    ModUserRestrictionData:
      type: object
      properties:
        id:
          type: integer
        user_name:
          type: string
        mute_until:
          type: integer
          nullable: true
        kick_until:
          type: integer
          nullable: true

    ModUserRestrictionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ModUserRestrictionData"

    RoomListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Room"

    CreateRoomRequest:
      type: object
      required: [room_name]
      properties:
        room_name:
          type: string
          maxLength: 191
        topic:
          type: string
          nullable: true
          maxLength: 2000
          description: Опис кімнати (поле `topic` у моделі)

    RoomSingleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Room"

    ChatSettingsData:
      type: object
      required:
        - room_create_min_public_messages
        - public_message_count_scope
      properties:
        room_create_min_public_messages:
          type: integer
          minimum: 0
          description: Мінімальна кількість публічних повідомлень; право створення кімнати при лічильнику **> N** (**T44**).
        public_message_count_scope:
          type: string
          enum: [all_public_rooms, default_room_only]
          description: Усі публічні кімнати vs одна обрана кімната для лічби.
        message_count_room_id:
          type: integer
          nullable: true
          description: Якщо scope = `default_room_only` — `room_id` публічної кімнати; інакше null.

    ChatSettingsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ChatSettingsData"

    PatchChatSettingsRequest:
      type: object
      properties:
        room_create_min_public_messages:
          type: integer
          minimum: 0
          maximum: 99999999
        public_message_count_scope:
          type: string
          enum: [all_public_rooms, default_room_only]
        message_count_room_id:
          type: integer
          nullable: true
          description: Лише `rooms` з `access === 0` (публічна); інакше 422.

    PatchChatMessageRequest:
      type: object
      properties:
        message:
          type: string
          description: |
            Plain text (не HTML). Після trim порожній дозволено лише якщо у повідомлення вже є вкладене зображення.
            Максимальна довжина — як у `PostChatMessageRequest.message` (роль: 2000 / 4000 / 8000).
        style:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ChatMessageBodyStyle"

    ChatMessagePatchResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ChatMessage"

    ChatMessageDeleteResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ChatMessage"

    ChatMessage:
      type: object
      properties:
        post_id:
          type: integer
        user_id:
          type: integer
        post_date:
          type: integer
          description: Unix timestamp
        post_edited_at:
          type: integer
          nullable: true
          description: Unix час останнього редагування; null — не редагувалось
        can_edit:
          type: boolean
          description: Чи дозволено поточному користувачу `PATCH` це повідомлення (T36)
        post_deleted_at:
          type: integer
          nullable: true
          description: Unix час soft-delete; null — повідомлення активне (T37)
        can_delete:
          type: boolean
          description: Чи дозволено поточному користувачу `DELETE` це повідомлення; false після видалення (T37)
        post_time:
          type: string
          nullable: true
        post_user:
          type: string
        avatar:
          type: string
          nullable: true
          description: URL аватарки автора на момент допису; null — показувати ініціали (див. T17/T18)
        post_message:
          description: Plain text тіла повідомлення (не HTML); клієнт не повинен інтерпретувати як розмітку.
          type: string
        post_style:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ChatMessageBodyStyle"
        post_color:
          type: string
          nullable: true
        post_roomid:
          type: integer
        type:
          type: string
          description: >
            `public` — загальне повідомлення кімнати; `inline_private` — інлайн-приват у стрічці (T25),
            видимий лише відправнику та адресату в `GET .../rooms/{id}/messages`; не потрапляє в архів.
            Для `inline_private` сервер також створює рядок у `private_messages` (той самий `client_message_id`), щоб узгодити з приватним API.
        recipient_user_id:
          type: integer
          nullable: true
          description: Для `inline_private` — id адресата; інакше відсутнє.
        client_message_id:
          type: string
          nullable: true
        file:
          type: integer
          description: 0 — без вкладення; інакше `images.id`
        image:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            url:
              type: string
              format: uri

    ChatImageUploadResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, url, mime, size_bytes]
          properties:
            id:
              type: integer
            url:
              type: string
              format: uri
            mime:
              type: string
            size_bytes:
              type: integer

    ChatImageListItem:
      type: object
      required: [id, url, mime, size_bytes, file_name, date_sent]
      properties:
        id:
          type: integer
        url:
          type: string
          format: uri
        mime:
          type: string
        size_bytes:
          type: integer
        file_name:
          type: string
        date_sent:
          type: integer
          description: Unix timestamp (секунди)

    ChatImagesPaginatedResponse:
      type: object
      description: LengthAwarePaginator у JSON (поля на верхньому рівні, як у Laravel)
      required: [data, current_page, last_page, per_page, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatImageListItem"
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        links:
          type: array
          items:
            type: object
        first_page_url:
          type: string
          nullable: true
        last_page_url:
          type: string
          nullable: true
        next_page_url:
          type: string
          nullable: true
        prev_page_url:
          type: string
          nullable: true
        path:
          type: string
        from:
          type: integer
          nullable: true
        to:
          type: integer
          nullable: true

    SlashMeta:
      type: object
      required: [name, recognized]
      properties:
        name:
          type: string
          nullable: true
        recognized:
          type: boolean

    ChatMessageBodyStyle:
      type: object
      description: >
        Пресети форматування тіла повідомлення (T30). Текст лишається plain; стиль — JSON на бекенді.
        Поля `bg` та `fg` взаємовиключні (одночасно не приймаються).
      properties:
        bold:
          type: boolean
        italic:
          type: boolean
        underline:
          type: boolean
        bg:
          type: string
          nullable: true
          enum: [amber, mint, sky, lavender, rose, sand]
          description: Колір тла «чіпа» повідомлення
        fg:
          type: string
          nullable: true
          enum: [blue, emerald, rose, violet, amber, slate]
          description: Колір тексту без окремого тла

    PostChatMessageRequest:
      type: object
      required: [client_message_id]
      properties:
        message:
          type: string
          nullable: true
          description: |
            Plain text (не HTML). Максимальна довжина залежить від ролі автентифікованого користувача:
            гість — 2000, звичайний користувач — 4000, VIP / модератор / адмін — 8000 символів.
        image_id:
          type: integer
          minimum: 1
          nullable: true
          description: Ідентифікатор з `POST /api/v1/images`; має належати поточному користувачу
        client_message_id:
          type: string
          format: uuid
        style:
          $ref: "#/components/schemas/ChatMessageBodyStyle"
          nullable: true
          description: Опційно; «липкий» стан зазвичай зберігається в localStorage на клієнті

    ChatMessageListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        meta:
          type: object
          required: [next_cursor, last_read_post_id]
          properties:
            next_cursor:
              type: integer
              nullable: true
            last_read_post_id:
              type: integer
              nullable: true
              description: Останній прочитаний post_id (T47); null якщо стану ще немає
            first_unread_post_id:
              type: integer
              nullable: true
              description: Лише коли `since_read=true` у запиті; перший непрочитаний у межах сторінки

    PostRoomReadRequest:
      type: object
      required: [last_read_post_id]
      properties:
        last_read_post_id:
          type: integer
          minimum: 1

    RoomReadResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [room_id, last_read_post_id]
          properties:
            room_id:
              type: integer
            last_read_post_id:
              type: integer

    RoomPresenceStatusesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties:
            type: string
            enum: [online, away, inactive]
          description: Ключі — рядкові user id

    PostRoomPresenceStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [online, away, inactive]

    RoomPresenceStatusPostResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [room_id, user_id, status]
          properties:
            room_id:
              type: integer
            user_id:
              type: integer
            status:
              type: string
              enum: [online, away, inactive]

    RoomPeerHintEntry:
      type: object
      required: [sex]
      properties:
        sex:
          type: string
          enum: [male, female, other]

    RoomPeerHintsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RoomPeerHintEntry"

    ArchiveMessagesPaginatedResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        links:
          type: object
          description: Посилання пагінації Laravel (`first`, `last`, `prev`, `next`; можуть бути `null`)
        meta:
          type: object
          description: Метадані LengthAwarePaginator (мінімум current_page, last_page, per_page, total)
          properties:
            current_page:
              type: integer
            last_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            from:
              type: integer
              nullable: true
            to:
              type: integer
              nullable: true

    ChatMessagePostResponseCreated:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ChatMessage"
        meta:
          type: object
          required: [duplicate, slash]
          properties:
            duplicate:
              type: boolean
              enum: [false]
            slash:
              $ref: "#/components/schemas/SlashMeta"

    ChatMessagePostResponseDuplicate:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ChatMessage"
        meta:
          type: object
          required: [duplicate, slash]
          properties:
            duplicate:
              type: boolean
              enum: [true]
            slash:
              $ref: "#/components/schemas/SlashMeta"

    ValidationErrorBody:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    ClientIdRoomConflict:
      type: object
      properties:
        message:
          type: string
          example: client_message_id already used for another room.

    ErrorMessage:
      type: object
      properties:
        message:
          type: string

  responses:
    Unauthorized:
      description: Неавторизовано
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
    Forbidden:
      description: Немає доступу до кімнати
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
    NotFound:
      description: Кімната не знайдена
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
    ValidationError:
      description: Помилка валідації
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorBody"
    TooManyRequests:
      description: Перевищено ліміт запитів
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
