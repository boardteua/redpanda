# Локальний перехоплювач SMTP (як MailHog): веб-інтерфейс + SMTP без реальної відправки.
# Запуск з каталогу backend/: docker compose -f docker-compose.mailpit.yml up -d
# UI: http://127.0.0.1:8025  |  SMTP: 127.0.0.1:1025
name: redpanda-mailpit

services:
  mailpit:
    image: axllent/mailpit:v1.29.3
    container_name: redpanda-mailpit
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    restart: unless-stopped
