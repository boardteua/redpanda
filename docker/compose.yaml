# Redpanda: MySQL 8 + Redis 7; профіль `app` — PHP-FPM, Nginx, Reverb, queue.
#
# Локально: без секретів — дефолтні паролі в шаблоні (${VAR:-default}).
# Продакшен: один файл `docker/production.env` (gitignored) і той самий маніфест:
#   docker compose --env-file docker/production.env -f docker/compose.yaml --profile app up -d
# deploy.sh / backup-mysql.sh додають --env-file автоматично, коли файл існує.
#
# Опційно `docker/compose.override.yml` лише для локального пробросу портів (compose.override.example.yml).
#
# Запуск з кореня репозиторію:
#   docker compose -f docker/compose.yaml up -d

name: redpanda-local-deps

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-redpanda}
      MYSQL_USER: ${MYSQL_USER:-redpanda}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-redpanda}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server
        fi
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi || exit 1
      interval: 5s
      timeout: 3s
      retries: 5

  php:
    profiles: ["app"]
    build:
      context: php
      dockerfile: Dockerfile
    volumes:
      - ../backend:/var/www/html
    env_file:
      - path: production.env
        required: false
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      DB_DATABASE: ${MYSQL_DATABASE:-redpanda}
      DB_USERNAME: ${MYSQL_USER:-redpanda}
      DB_PASSWORD: ${MYSQL_PASSWORD:-redpanda}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    profiles: ["app"]
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../backend:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  reverb:
    profiles: ["app"]
    build:
      context: php
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan reverb:start
    env_file:
      - path: production.env
        required: false
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      DB_DATABASE: ${MYSQL_DATABASE:-redpanda}
      DB_USERNAME: ${MYSQL_USER:-redpanda}
      DB_PASSWORD: ${MYSQL_PASSWORD:-redpanda}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REVERB_SERVER_PORT: "6001"
    volumes:
      - ../backend:/var/www/html
    ports:
      - "6001:6001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  queue:
    profiles: ["app"]
    build:
      context: php
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3
    env_file:
      - path: production.env
        required: false
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      DB_DATABASE: ${MYSQL_DATABASE:-redpanda}
      DB_USERNAME: ${MYSQL_USER:-redpanda}
      DB_PASSWORD: ${MYSQL_PASSWORD:-redpanda}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - ../backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
