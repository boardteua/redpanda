# Локальні залежності для redpanda (T83): MySQL + Redis.
# PHP, Nginx, Reverb і queue worker зазвичай запускають на хості (`composer dev` у backend/)
# або додають окремі сервіси в наступних інкрементах.
#
# Запуск з кореня репозиторію:
#   docker compose -f docker/compose.yaml up -d
#
# У backend/.env (приклад):
#   DB_HOST=127.0.0.1
#   DB_PORT=3306
#   REDIS_HOST=127.0.0.1

name: redpanda-local-deps

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: redpanda
      MYSQL_USER: redpanda
      MYSQL_PASSWORD: redpanda
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
