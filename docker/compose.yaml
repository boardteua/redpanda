# Redpanda: MySQL 8 + Redis 7; профіль `app` — PHP-FPM, Nginx, Reverb, queue.
#
# Локально: дефолти ${VAR:-root|redpanda} і Redis без пароля — лише для dev; у проді не покладайтеся на них.
# Продакшен: у production.env канон для юзера БД додатку — DB_DATABASE / DB_USERNAME / DB_PASSWORD (Laravel).
# Compose підставляє їх у змінні образу mysql (MYSQL_*). Окремо лише MYSQL_ROOT_PASSWORD (root для бекапів ≠ app user).
# Зворотна сумісність: якщо задано лише MYSQL_PASSWORD (legacy) — він використовується, коли DB_PASSWORD порожній.
# Продакшен: один файл `docker/production.env` (gitignored) і той самий маніфест:
#   docker compose --env-file docker/production.env -f docker/compose.yaml --profile app up -d
# deploy.sh / backup-mysql.sh додають --env-file автоматично, коли файл існує.
#
# Опційно `docker/compose.override.yml` лише для локального пробросу портів (compose.override.example.yml).
#
# Запуск з кореня репозиторію:
#   docker compose -f docker/compose.yaml up -d

name: redpanda-local-deps

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-${MYSQL_DATABASE:-redpanda}}
      MYSQL_USER: ${DB_USERNAME:-${MYSQL_USER:-redpanda}}
      MYSQL_PASSWORD: ${DB_PASSWORD:-${MYSQL_PASSWORD:-redpanda}}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server
        fi
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi || exit 1
      interval: 5s
      timeout: 3s
      retries: 5

  php:
    profiles: ["app"]
    build:
      context: php
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
    env_file:
      - path: production.env
        required: false
    environment:
      # Примусово MySQL у контейнері: інакше змонтований backend/.env (напр. sqlite для хостових тестів) ламає queue/reverb.
      DB_CONNECTION: mysql
      DB_HOST: mysql
      REDIS_HOST: redis
      DB_DATABASE: ${DB_DATABASE:-${MYSQL_DATABASE:-redpanda}}
      DB_USERNAME: ${DB_USERNAME:-${MYSQL_USER:-redpanda}}
      DB_PASSWORD: ${DB_PASSWORD:-${MYSQL_PASSWORD:-redpanda}}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Має збігатися з reverb: інакше `php artisan optimize` у контейнері php закешує порт 8080
      # (дефолт у config/reverb.php), а Docker пробросить 6001 — WS з хоста не дістане Reverb.
      REVERB_SERVER_PORT: "6001"
      # PHP → Reverb усередині мережі compose (не localhost у контейнері).
      REVERB_HOST: reverb
      REVERB_PORT: "6001"
      REVERB_SCHEME: http
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    profiles: ["app"]
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../backend:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  reverb:
    profiles: ["app"]
    build:
      context: php
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan reverb:start
    env_file:
      - path: production.env
        required: false
    environment:
      # Примусово MySQL у контейнері: інакше змонтований backend/.env (напр. sqlite для хостових тестів) ламає queue/reverb.
      DB_CONNECTION: mysql
      DB_HOST: mysql
      REDIS_HOST: redis
      DB_DATABASE: ${DB_DATABASE:-${MYSQL_DATABASE:-redpanda}}
      DB_USERNAME: ${DB_USERNAME:-${MYSQL_USER:-redpanda}}
      DB_PASSWORD: ${DB_PASSWORD:-${MYSQL_PASSWORD:-redpanda}}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REVERB_SERVER_PORT: "6001"
      REVERB_HOST: reverb
      REVERB_PORT: "6001"
      REVERB_SCHEME: http
    volumes:
      - ../backend:/var/www/html
    ports:
      - "6001:6001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  queue:
    profiles: ["app"]
    build:
      context: php
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3
    env_file:
      - path: production.env
        required: false
    environment:
      # Примусово MySQL у контейнері: інакше змонтований backend/.env (напр. sqlite для хостових тестів) ламає queue/reverb.
      DB_CONNECTION: mysql
      DB_HOST: mysql
      REDIS_HOST: redis
      DB_DATABASE: ${DB_DATABASE:-${MYSQL_DATABASE:-redpanda}}
      DB_USERNAME: ${DB_USERNAME:-${MYSQL_USER:-redpanda}}
      DB_PASSWORD: ${DB_PASSWORD:-${MYSQL_PASSWORD:-redpanda}}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REVERB_SERVER_PORT: "6001"
      REVERB_HOST: reverb
      REVERB_PORT: "6001"
      REVERB_SCHEME: http
    volumes:
      - ../backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
