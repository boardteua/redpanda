# Фрагмент для хостового nginx (TLS на 443), коли Laravel HTTP у Docker :8080, Reverb — :6001.
# Документація Reverb: WebSocket на /app/*, HTTP API на /apps/* — обидва шляхи на той самий upstream.
#
# =============================================================================
# ВАЖЛИВО (nginx): proxy_set_header у location
# =============================================================================
# Якщо в `location /app/` задати лише Upgrade/Connection, nginx НЕ успадковує
# proxy_set_header з рівня server/http. Тоді до Reverb піде Host з дефолту
# proxy — зазвичай 127.0.0.1 (з proxy_pass), а не публічний домен.
# Reverb відповість 426 «Upgrade…» / помилка WS. У кожному location для Reverb
# повторіть Host, X-Forwarded-Proto, X-Forwarded-For (як у прикладі нижче).
#
# Не використовуйте `location /app` без слеша: префікс /app збігається з /apps…
# Безпечний варіант — `location /app/` (не перехоплює /apps).
# =============================================================================
#
# Підставте server_name та шляхи до сертифікатів (Certbot).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

