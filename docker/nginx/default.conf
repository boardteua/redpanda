server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # Docker DNS (127.0.0.11): резолв php під час запиту, не при старті nginx.
    # Інакше після restart nginx стартує раніше за php → «host not found in upstream php».
    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;

    client_max_body_size 128m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        set $fastcgi_upstream php:9000;
        fastcgi_pass $fastcgi_upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_hide_header X-Powered-By;
    }
}
